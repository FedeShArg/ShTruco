    <script>
        // ============================================================================
        // CONSTANTS & DATA
        // ============================================================================

        const SUITS = {
            ESPADAS: 'espadas',
            BASTOS: 'bastos',
            COPAS: 'copas',
            OROS: 'oros'
        };

        const SUIT_SYMBOLS = {
            espadas: '🗡️',
            bastos: '🪵',
            copas: '🍷',
            oros: '🟡'
        };

        const CARD_VALUES = [1, 2, 3, 4, 5, 6, 7, 10, 11, 12];

        // Card hierarchy for Truco (index = rank, higher = better)
        // Card hierarchy: lower index = stronger. Cards at same rank tie.
        // Entries with suit:null match any suit. Entries with specific suits
        // only match that suit. Multiple entries can share the same rank.
        const CARD_HIERARCHY = [
            { value: 1, suit: SUITS.ESPADAS, rank: 0 },      // Macho
            { value: 1, suit: SUITS.BASTOS, rank: 1 },       // Hembra
            { value: 7, suit: SUITS.ESPADAS, rank: 2 },      // Siete Bravo
            { value: 7, suit: SUITS.OROS, rank: 3 },
            { value: 3, suit: null, rank: 4 },                // All 3s
            { value: 2, suit: null, rank: 5 },                // All 2s
            { value: 1, suit: SUITS.COPAS, rank: 6 },        // Ancho Falso (Copas & Oros TIE)
            { value: 1, suit: SUITS.OROS, rank: 6 },         // Ancho Falso (same rank as Copas)
            { value: 12, suit: null, rank: 7 },               // All 12s
            { value: 11, suit: null, rank: 8 },               // All 11s
            { value: 10, suit: null, rank: 9 },               // All 10s
            { value: 7, suit: SUITS.COPAS, rank: 10 },       // Siete Falso (Copas & Bastos TIE)
            { value: 7, suit: SUITS.BASTOS, rank: 10 },      // Siete Falso (same rank as Copas)
            { value: 6, suit: null, rank: 11 },               // All 6s
            { value: 5, suit: null, rank: 12 },               // All 5s
            { value: 4, suit: null, rank: 13 }                // All 4s
        ];

        // ============================================================================
        // GAME STATE
        // ============================================================================

        let gameState = {
            screen: 'menu',
            playerScore: 0,
            botScore: 0,
            handNumber: 0,
            mano: 0, // 0 = player, 1 = bot
            deck: [],
            playerHand: [],
            botHand: [],
            playedCards: [],
            tricks: [], // [{player: card, bot: card, winner: 0|1}, ...]
            currentRound: 0,
            currentRoundCards: [null, null], // [player, bot]
            currentRoundLeader: null,
            envidoCalled: false,
            envidoLevel: 0, // 0 = not called, 1 = envido, 2 = envido, 3 = real envido, 4 = falta envido
            envidoAccepted: false,
            trucoCalled: false,
            trucoLevel: 0, // 0 = not called, 1 = truco, 2 = retruco, 3 = vale cuatro
            trucoAccepted: false,
            pointsAtStake: 1,
            waiting: false,
            botBusy: false,
            playerHasEnvidoOption: true,
            playerHasTrucoOption: true,
            turnPhase: 'round', // 'round' or 'envido_decision' or 'truco_decision'
            trucoLastCaller: null, // 'player' or 'bot' — who last raised
            envidoLastCaller: null, // 'player' or 'bot'
        };

        // ============================================================================
        // DECK & CARD FUNCTIONS
        // ============================================================================

        function createDeck() {
            const deck = [];
            for (const suit of Object.values(SUITS)) {
                for (const value of CARD_VALUES) {
                    deck.push({ value, suit });
                }
            }
            return shuffle(deck);
        }

        function shuffle(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function getCardHierarchy(card) {
            for (let i = 0; i < CARD_HIERARCHY.length; i++) {
                const h = CARD_HIERARCHY[i];
                if (h.suit === null && h.value === card.value) return h.rank;
                if (h.suit === card.suit && h.value === card.value) return h.rank;
            }
            return 999; // Not found (shouldn't happen)
        }

        function compareCards(card1, card2) {
            const h1 = getCardHierarchy(card1);
            const h2 = getCardHierarchy(card2);
            if (h1 < h2) return 1;  // card1 wins
            if (h2 < h1) return -1; // card2 wins
            return 0; // Tie
        }

        function getEnvidoValue(card) {
            if (card.value >= 10) return 0; // Figuras
            return card.value;
        }

        function calculateEnvidoScore(hand) {
            if (hand.length === 0) return 0;

            const suits = {};
            for (const card of hand) {
                if (!suits[card.suit]) suits[card.suit] = [];
                suits[card.suit].push(card);
            }

            // Check if any suit has 2+ cards
            for (const suit in suits) {
                if (suits[suit].length >= 2) {
                    // Sort by ENVIDO value (not raw value) — figuras=0, others=face value
                    const sorted = suits[suit].sort((a, b) => getEnvidoValue(b) - getEnvidoValue(a));
                    // Use top 2 envido values
                    let sum = getEnvidoValue(sorted[0]) + getEnvidoValue(sorted[1]);
                    return sum + 20;
                }
            }

            // No matching suit: highest single value
            let max = 0;
            for (const card of hand) {
                max = Math.max(max, getEnvidoValue(card));
            }
            return max;
        }

        // ============================================================================
        // GAME FLOW
        // ============================================================================

        function startGame() {
            gameState.screen = 'playing';
            gameState.playerScore = 0;
            gameState.botScore = 0;
            gameState.handNumber = 0;
            gameState.mano = 0;
            showScreen('gameScreen');
            clearChat();
            addChatMessage('Comienza la partida. Juega a 30 puntos.', 'system');
            dealHand();
        }

        function dealHand() {
            gameState.handNumber++;
            gameState.deck = createDeck();
            gameState.playerHand = [];
            gameState.botHand = [];
            gameState.playedCards = [];
            gameState.tricks = [];
            gameState.currentRound = 0;
            gameState.currentRoundCards = [null, null];
            gameState.currentRoundLeader = null;
            gameState.envidoCalled = false;
            gameState.envidoLevel = 0;
            gameState.envidoAccepted = false;
            gameState.trucoCalled = false;
            gameState.trucoLevel = 0;
            gameState.trucoAccepted = false;
            gameState.pointsAtStake = 1;
            gameState.playerHasEnvidoOption = true;
            gameState.playerHasTrucoOption = true;
            gameState.turnPhase = 'round';
            gameState.trucoLastCaller = null;
            gameState.envidoLastCaller = null;

            // Deal 3 cards to each player
            for (let i = 0; i < 3; i++) {
                gameState.playerHand.push(gameState.deck.pop());
                gameState.botHand.push(gameState.deck.pop());
            }

            addChatMessage(`--- Mano ${gameState.handNumber} ---`, 'system');
            addChatMessage(`${gameState.mano === 0 ? 'Sos' : 'Bot es'} mano`, 'system');

            // Animated deal
            renderScores();
            renderHand(true);
            renderBotHand(true);
            renderTable();
            renderTurnIndicator();
            renderButtons();
            setTimeout(() => {
                if (gameState.mano === 0) {
                    // Player is mano — check if bot wants to call envido
                    checkBotEnvidoCall();
                } else {
                    // Bot is mano — bot can call envido, then bot leads
                    checkBotEnvidoCall();
                    // If bot didn't call envido, bot should lead
                    if (!gameState.envidoCalled) {
                        setTimeout(() => {
                            botPlayCard();
                        }, 600);
                    }
                }
            }, 1000);
        }

        function playCard(index) {
            if (gameState.waiting || gameState.botBusy) return;
            if (gameState.currentRoundCards[0] !== null) return; // Player already played

            const card = gameState.playerHand[index];
            gameState.currentRoundCards[0] = card;
            gameState.playedCards.push(card);
            gameState.playerHand.splice(index, 1);

            gameState.waiting = true;
            addChatMessage('Jugaste ' + card.value + ' de ' + card.suit, 'player');
            render();

            if (gameState.currentRoundCards[1] !== null) {
                // Bot already led — both cards are now on the table, resolve
                setTimeout(() => {
                    gameState.waiting = false;
                    resolveRound();
                }, 800);
            } else {
                // Player led — wait for bot response
                setTimeout(() => {
                    botPlayCard();
                }, 800);
            }
        }

        function botPlayCard() {
            if (gameState.botBusy) return;
            gameState.botBusy = true;

            // Check if bot should fold (go to mazo)
            const strength = botEvaluateHandStrength();
            if (gameState.currentRound >= 1 && strength < 0.25 && gameState.pointsAtStake <= 2) {
                // Bot folds with weak hand after losing first trick
                const botLostFirst = gameState.tricks.length > 0 && gameState.tricks[0].winner === 0;
                if (botLostFirst && Math.random() < 0.4) {
                    gameState.botBusy = false;
                    addChatMessage('Bot se fue al mazo', 'bot');
                    showSpeechBubble('Me voy al mazo', 'bot', 'noquiero-bubble');
                    gameState.playerScore += gameState.pointsAtStake;
                    showScorePopup(gameState.pointsAtStake.toString(), true);
                    setTimeout(() => {
                        if (gameState.playerScore >= 30) {
                            endGame(0);
                        } else {
                            gameState.mano = 1 - gameState.mano;
                            dealHand();
                        }
                    }, 1500);
                    return;
                }
            }

            let cardToPlay = null;

            if (gameState.currentRoundCards[0] === null) {
                // Bot leads — play card and wait for player
                cardToPlay = botChooseLeadCard();
                gameState.currentRoundCards[1] = cardToPlay;
                gameState.playedCards.push(cardToPlay);
                gameState.botHand.splice(gameState.botHand.indexOf(cardToPlay), 1);

                addChatMessage('Bot juega ' + cardToPlay.value + ' de ' + cardToPlay.suit, 'bot');
                gameState.botBusy = false;
                gameState.waiting = false;
                gameState.turnPhase = 'round';
                render();
                // Now wait for player to respond by clicking a card
            } else {
                // Bot responds to player's lead
                cardToPlay = botChooseResponseCard();
                gameState.currentRoundCards[1] = cardToPlay;
                gameState.playedCards.push(cardToPlay);
                gameState.botHand.splice(gameState.botHand.indexOf(cardToPlay), 1);

                addChatMessage('Bot juega ' + cardToPlay.value + ' de ' + cardToPlay.suit, 'bot');
                gameState.waiting = false;
                gameState.botBusy = false;
                render();

                setTimeout(() => {
                    resolveRound();
                }, 600);
            }
        }

        function resolveRound() {
            const playerCard = gameState.currentRoundCards[0];
            const botCard = gameState.currentRoundCards[1];

            let winner = compareCards(playerCard, botCard);

            const trickWinner = winner === 0 ? 2 : (winner === 1 ? 0 : 1);
            gameState.tricks.push({
                player: playerCard,
                bot: botCard,
                winner: trickWinner, // 0 = player, 1 = bot, 2 = parda
            });

            const roundNum = ['1ra', '2da', '3ra'][gameState.currentRound] || '';
            if (trickWinner === 0) {
                addChatMessage(`${roundNum} ronda: Ganaste`, 'result');
                showTableAnnouncement('¡GANASTE!', `${roundNum} ronda`, 'announce-player', 1500);
            } else if (trickWinner === 1) {
                addChatMessage(`${roundNum} ronda: Bot gana`, 'result');
                showTableAnnouncement('BOT GANA', `${roundNum} ronda`, 'announce-bot', 1500);
            } else {
                addChatMessage(`${roundNum} ronda: Parda`, 'result');
                showTableAnnouncement('PARDA', `${roundNum} ronda`, 'announce-parda', 1500);
            }

            // Determine who leads next round
            if (winner === 1) {
                gameState.currentRoundLeader = 0; // Player wins
            } else if (winner === -1) {
                gameState.currentRoundLeader = 1; // Bot wins
            } else {
                gameState.currentRoundLeader = 2; // Parda
            }

            gameState.currentRound++;

            // Check for early termination: if someone already won 2 tricks
            const playerTrickWins = gameState.tricks.filter(t => t.winner === 0).length;
            const botTrickWins = gameState.tricks.filter(t => t.winner === 1).length;
            const earlyWin = playerTrickWins >= 2 || botTrickWins >= 2;

            // Also check parda-based early wins:
            // If first round was parda and second round has a winner, that winner takes the hand
            const pardaEarlyWin = gameState.tricks.length >= 2 &&
                gameState.tricks[0].winner === 2 && gameState.tricks[1].winner !== 2;

            if (gameState.currentRound < 3 && !earlyWin && !pardaEarlyWin) {
                gameState.currentRoundCards = [null, null];
                render();

                setTimeout(() => {
                    // Determine who plays first in next round
                    if (gameState.currentRoundLeader === 2) {
                        // Parda: if it's the first round, mano plays again
                        if (gameState.currentRound === 1 && gameState.tricks[0].winner === 2) {
                            // First round was parda, mano (based on initial mano) plays
                            if (gameState.mano === 0) {
                                gameState.turnPhase = 'round';
                                render();
                            } else {
                                botPlayCard();
                            }
                        } else {
                            // Other case: whoever won previous round or follow established logic
                            if (gameState.mano === 0) {
                                gameState.turnPhase = 'round';
                                render();
                            } else {
                                botPlayCard();
                            }
                        }
                    } else if (gameState.currentRoundLeader === 0) {
                        // Player won, player plays
                        gameState.turnPhase = 'round';
                        render();
                    } else {
                        // Bot won, bot plays
                        botPlayCard();
                    }
                }, 600);
            } else {
                setTimeout(() => {
                    finishHand();
                }, 1500);
            }
        }

        function determineHandWinner() {
            let playerWins = 0;
            let botWins = 0;

            for (let i = 0; i < gameState.tricks.length; i++) {
                const trick = gameState.tricks[i];

                if (i === 0 && trick.winner === 2) {
                    // First round is parda
                    if (gameState.tricks.length > 1) {
                        if (gameState.tricks[1].winner === 0) {
                            playerWins++;
                        } else if (gameState.tricks[1].winner === 1) {
                            botWins++;
                        } else if (gameState.tricks.length > 2) {
                            // Second also parda, check third
                            if (gameState.tricks[2].winner === 0 || gameState.tricks[2].winner === 2) {
                                playerWins++;
                            } else {
                                botWins++;
                            }
                        } else {
                            // Only first was parda, second will be checked
                        }
                    }
                } else if (i === 1 && gameState.tricks[0].winner !== 2 && trick.winner === 2) {
                    // First round won by someone, second is parda -> first player wins
                    if (gameState.tricks[0].winner === 0) {
                        playerWins = 2;
                    } else {
                        botWins = 2;
                    }
                } else if (trick.winner === 0) {
                    playerWins++;
                } else if (trick.winner === 1) {
                    botWins++;
                } else {
                    // Parda
                }
            }

            // Count tricks won
            playerWins = gameState.tricks.filter(t => t.winner === 0).length;
            botWins = gameState.tricks.filter(t => t.winner === 1).length;

            // Handle parda logic
            for (let i = 0; i < gameState.tricks.length; i++) {
                if (gameState.tricks[i].winner === 2) {
                    if (i === 0 && gameState.tricks.length > 1 && gameState.tricks[1].winner !== 2) {
                        // First parda, second not parda
                        if (gameState.tricks[1].winner === 0) {
                            playerWins++;
                        } else {
                            botWins++;
                        }
                        gameState.tricks[i].winner = -1; // Mark as resolved
                    } else if (i === 1 && gameState.tricks[0].winner !== 2 && gameState.tricks[0].winner !== -1) {
                        // Second round parda, first round wasn't parda
                        // First player wins
                        if (gameState.tricks[0].winner === 0) {
                            playerWins++;
                        } else {
                            botWins++;
                        }
                        gameState.tricks[i].winner = -1;
                    } else if (i === 2) {
                        // Third round, any parda means mano wins
                        if (gameState.mano === 0) {
                            playerWins++;
                        } else {
                            botWins++;
                        }
                        gameState.tricks[i].winner = -1;
                    }
                }
            }

            if (playerWins > botWins) {
                return 0; // Player wins
            } else if (botWins > playerWins) {
                return 1; // Bot wins
            } else {
                // Tie: mano wins
                return gameState.mano;
            }
        }

        function finishHand() {
            const handWinner = determineHandWinner();
            const pointsToAdd = gameState.pointsAtStake;

            if (handWinner === 0) {
                gameState.playerScore += pointsToAdd;
                addChatMessage(`Ganaste la mano (+${pointsToAdd} pts)`, 'player');
                showTableAnnouncement('¡MANO TUYA!', `+${pointsToAdd} punto${pointsToAdd > 1 ? 's' : ''}`, 'announce-player', 2000);
                showPointsBadge(pointsToAdd, true);
            } else {
                gameState.botScore += pointsToAdd;
                addChatMessage(`Bot gana la mano (+${pointsToAdd} pts)`, 'bot');
                showTableAnnouncement('BOT GANA MANO', `+${pointsToAdd} punto${pointsToAdd > 1 ? 's' : ''}`, 'announce-bot', 2000);
                showPointsBadge(pointsToAdd, false);
            }

            render();

            setTimeout(() => {
                if (gameState.playerScore >= 30) {
                    endGame(0);
                } else if (gameState.botScore >= 30) {
                    endGame(1);
                } else {
                    // Next hand
                    gameState.mano = 1 - gameState.mano;
                    dealHand();
                }
            }, 2000);
        }

        function endGame(winner) {
            gameState.screen = 'gameover';
            document.getElementById('gameoverPlayerScore').textContent = gameState.playerScore;
            document.getElementById('gameoverBotScore').textContent = gameState.botScore;
            if (winner === 0) {
                document.getElementById('gameoverTitle').textContent = '¡GANASTE!';
                document.getElementById('gameoverTitle').style.color = '#d4a843';
            } else {
                document.getElementById('gameoverTitle').textContent = '¡PERDISTE!';
                document.getElementById('gameoverTitle').style.color = '#c45a6a';
            }
            showScreen('gameOverScreen');
        }

        function returnToMenu() {
            gameState.screen = 'menu';
            showScreen('menuScreen');
        }

        // ============================================================================
        // BOT AI
        // ============================================================================

        function checkBotEnvidoCall() {
            if (!gameState.playerHasEnvidoOption) return;
            if (gameState.envidoCalled) return;
            if (gameState.currentRound > 0) return;

            const botEnvidoScore = calculateEnvidoScore(gameState.botHand);
            const roll = Math.random();

            // Bot es un loco — canta envido mucho más seguido
            // 25+ siempre, 20+ casi siempre, 15+ a veces, incluso bluffea con menos
            const shouldCall = botEnvidoScore >= 25 ||
                (botEnvidoScore >= 20 && roll < 0.75) ||
                (botEnvidoScore >= 15 && roll < 0.4) ||
                (roll < 0.12); // Bluff puro

            if (shouldCall) {
                // A veces arranca directo con Real Envido o Falta Envido
                if (botEnvidoScore >= 30 && roll < 0.35) {
                    // Arranca con Falta Envido de una — un verdadero loco
                    setTimeout(() => {
                        addChatMessage('Bot canta: ¡FALTA ENVIDO!', 'envido');
                        showSpeechBubble('¡FALTA ENVIDO!', 'bot', 'envido-bubble');
                        gameState.envidoCalled = true;
                        gameState.envidoLevel = 4;
                        gameState.envidoLastCaller = 'bot';
                        gameState.turnPhase = 'envido_decision';
                        document.getElementById('envidoCallTitle').textContent = 'FALTA ENVIDO';
                        document.getElementById('envidoCallMessage').textContent = 'Bot cantó Falta Envido — ¡se volvió loco!';
                        updateEnvidoEscalateButtons();
                        document.getElementById('envidoCallOverlay').classList.add('active');
                        render();
                    }, 1200);
                } else if (botEnvidoScore >= 27 && roll < 0.3) {
                    // Arranca con Real Envido
                    setTimeout(() => {
                        addChatMessage('Bot canta: ¡REAL ENVIDO!', 'envido');
                        showSpeechBubble('¡REAL ENVIDO!', 'bot', 'envido-bubble');
                        gameState.envidoCalled = true;
                        gameState.envidoLevel = 3;
                        gameState.envidoLastCaller = 'bot';
                        gameState.turnPhase = 'envido_decision';
                        document.getElementById('envidoCallTitle').textContent = 'REAL ENVIDO';
                        document.getElementById('envidoCallMessage').textContent = 'Bot cantó Real Envido';
                        updateEnvidoEscalateButtons();
                        document.getElementById('envidoCallOverlay').classList.add('active');
                        render();
                    }, 1200);
                } else {
                    setTimeout(() => {
                        callBotEnvido();
                    }, 1200);
                }
            }
        }

        function callBotEnvido() {
            addChatMessage('Bot canta: ¡ENVIDO!', 'envido');
            showSpeechBubble('¡ENVIDO!', 'bot', 'envido-bubble');
            gameState.envidoCalled = true;
            gameState.envidoLevel = 1;
            gameState.envidoLastCaller = 'bot';
            gameState.turnPhase = 'envido_decision';
            document.getElementById('envidoCallTitle').textContent = 'ENVIDO';
            document.getElementById('envidoCallMessage').textContent = 'Bot cantó Envido';
            updateEnvidoEscalateButtons();
            document.getElementById('envidoCallOverlay').classList.add('active');
            render();
        }

        function checkBotTrucoCall() {
            if (!gameState.playerHasTrucoOption) return;
            if (gameState.trucoCalled) return;

            // LOCO bot — calls truco aggressively!
            const handStrength = botEvaluateHandStrength();
            let callChance = 0;
            if (handStrength >= 0.7) callChance = 0.9;       // Strong hand: almost always
            else if (handStrength >= 0.5) callChance = 0.65;  // Decent hand: often
            else if (handStrength >= 0.35) callChance = 0.35; // Meh hand: sometimes bluff
            else callChance = 0.12;                           // Bad hand: occasional bluff

            if (Math.random() < callChance) {
                setTimeout(() => {
                    callBotTruco();
                }, 800 + Math.random() * 700);
            }
        }

        function callBotTruco() {
            const nextLevel = gameState.trucoLevel + 1;
            if (nextLevel > 3) return;
            addChatMessage(`Bot canta: ¡${TRUCO_NAMES[nextLevel]}!`, 'truco-msg');
            showSpeechBubble(`¡${TRUCO_NAMES[nextLevel]}!`, 'bot', 'truco-bubble');
            gameState.trucoCalled = true;
            gameState.trucoLevel = nextLevel;
            gameState.pointsAtStake = TRUCO_STAKES[nextLevel];
            gameState.trucoLastCaller = 'bot';
            gameState.trucoAccepted = false;
            gameState.turnPhase = 'truco_decision';
            document.getElementById('trucoCallTitle').textContent = TRUCO_NAMES[nextLevel];
            document.getElementById('trucoCallMessage').textContent = `Bot cantó ${TRUCO_NAMES[nextLevel]}`;
            document.getElementById('trucoCallOverlay').classList.add('active');
            render();
        }

        function botChooseLeadCard() {
            // Bot leads: play a middle-strength card
            const hand = gameState.botHand;
            if (hand.length === 0) return null;

            // Sort copy (don't mutate gameState) — lower hierarchy index = stronger
            const sorted = [...hand].sort((a, b) => getCardHierarchy(a) - getCardHierarchy(b));

            if (sorted.length === 1) return sorted[0];
            if (sorted.length === 2) return sorted[1]; // weaker of two
            return sorted[1]; // Middle card
        }

        function botChooseResponseCard() {
            const playerCard = gameState.currentRoundCards[0];
            const hand = gameState.botHand;

            // Sort copy by strength: weakest first (highest hierarchy index first)
            const sorted = [...hand].sort((a, b) => getCardHierarchy(b) - getCardHierarchy(a));

            // Find cheapest winning card (iterate from weakest to strongest)
            for (const card of sorted) {
                if (compareCards(card, playerCard) === 1) {
                    return card;
                }
            }

            // No winning card: play weakest card (first in sorted = highest hierarchy = weakest)
            return sorted[0];
        }

        function botEvaluateHandStrength() {
            let strength = 0;
            for (const card of gameState.botHand) {
                // Lower hierarchy index = stronger card (0=Ancho Espadas, 15=4s)
                const rank = getCardHierarchy(card);
                if (rank <= 4) strength += 1.0;       // Top tier: Anchos, 7 bravo/oros, 3s
                else if (rank <= 8) strength += 0.7;   // Mid tier: 2s, Ancho falso, 12s
                else if (rank <= 10) strength += 0.4;   // Low-mid: 11s, 10s
                else strength += 0.2;                    // Weak: 7 falso, 6s, 5s, 4s
            }
            return Math.min(strength / 3, 1.0);
        }

        // ============================================================================
        // ENVIDO LOGIC
        // ============================================================================

        const ENVIDO_NAMES = { 1: 'ENVIDO', 2: 'ENVIDO', 3: 'REAL ENVIDO', 4: 'FALTA ENVIDO' };

        function callEnvido() {
            if (gameState.envidoCalled) return;
            if (gameState.currentRound > 0) return;
            if (gameState.playerHasEnvidoOption === false) return;
            addChatMessage('Cantás: ¡ENVIDO!', 'envido');
            showSpeechBubble('¡ENVIDO!', 'player', 'envido-bubble');

            gameState.envidoCalled = true;
            gameState.envidoLevel = 1;
            gameState.envidoLastCaller = 'player';
            gameState.turnPhase = 'envido_decision';

            setTimeout(() => {
                respondBotEnvido();
            }, 1200);
        }

        function escalateEnvido(type) {
            // Player escalates during bot's envido call
            document.getElementById('envidoCallOverlay').classList.remove('active');
            let newLevel;
            if (type === 'envido' && gameState.envidoLevel < 2) newLevel = 2;
            else if (type === 'real_envido') newLevel = 3;
            else if (type === 'falta') newLevel = 4;
            else return;

            if (newLevel <= gameState.envidoLevel) return;

            gameState.envidoLevel = newLevel;
            gameState.envidoLastCaller = 'player';
            addChatMessage(`Cantás: ¡${ENVIDO_NAMES[newLevel]}!`, 'envido');
            showSpeechBubble(`¡${ENVIDO_NAMES[newLevel]}!`, 'player', 'envido-bubble');

            // Bot must respond to the escalation
            setTimeout(() => {
                respondBotEnvido();
            }, 1200);
        }

        function respondBotEnvido() {
            const botEnvidoScore = calculateEnvidoScore(gameState.botHand);
            const roll = Math.random();

            // Bot loco: primero intenta ESCALAR antes de aceptar
            if (gameState.envidoLevel < 4 && gameState.envidoLastCaller === 'player') {
                let shouldEscalate = false;
                let targetLevel = gameState.envidoLevel + 1;

                if (botEnvidoScore >= 30) {
                    // Con 30+, va a Falta Envido directo 50% de las veces
                    if (roll < 0.5) { targetLevel = 4; shouldEscalate = true; }
                    else if (roll < 0.8) { targetLevel = Math.min(gameState.envidoLevel + 1, 4); shouldEscalate = true; }
                } else if (botEnvidoScore >= 27) {
                    // Con 27-29, escala al siguiente nivel 60%
                    if (roll < 0.6) { shouldEscalate = true; }
                    // A veces salta a Falta directo
                    if (roll < 0.2) { targetLevel = 4; }
                } else if (botEnvidoScore >= 23) {
                    // Con 23-26, escala 35% (medio bluff)
                    if (roll < 0.35) { shouldEscalate = true; }
                } else {
                    // Bluff puro: escala 15% con envido malo
                    if (roll < 0.15) { shouldEscalate = true; }
                }

                if (shouldEscalate && targetLevel > gameState.envidoLevel && targetLevel <= 4) {
                    gameState.envidoLevel = targetLevel;
                    gameState.envidoLastCaller = 'bot';
                    const name = ENVIDO_NAMES[targetLevel];
                    addChatMessage(`Bot canta: ¡${name}!`, 'envido');
                    showSpeechBubble(`¡${name}!`, 'bot', 'envido-bubble');
                    document.getElementById('envidoCallTitle').textContent = name;
                    document.getElementById('envidoCallMessage').textContent = `Bot cantó ${name} — ¡está loco!`;
                    updateEnvidoEscalateButtons();
                    document.getElementById('envidoCallOverlay').classList.add('active');
                    return;
                }
            }

            // Si no escaló, decide si acepta
            // Bot loco: acepta con umbrales más bajos
            const acceptThreshold = botEnvidoScore >= 22 ||
                (botEnvidoScore >= 18 && roll < 0.5) ||
                (roll < 0.2); // Acepta con cualquier cosa 20% del tiempo

            if (acceptThreshold) {
                respondEnvido(true, true);
            } else {
                respondEnvido(false, true);
            }
        }

        function updateEnvidoEscalateButtons() {
            const lvl = gameState.envidoLevel;
            const escBtns = document.getElementById('envidoEscalateButtons');
            document.getElementById('escalateEnvidoBtn').style.display = lvl < 2 ? '' : 'none';
            document.getElementById('escalateRealEnvidoBtn').style.display = lvl < 3 ? '' : 'none';
            document.getElementById('escalateFaltaBtn').style.display = lvl < 4 ? '' : 'none';
            // Hide entire row if no escalation possible
            escBtns.style.display = lvl >= 4 ? 'none' : '';
        }

        // Envido point values by level
        const ENVIDO_POINTS = { 1: 2, 2: 4, 3: 7, 4: 'falta' }; // envido, envido+envido, +real envido, falta

        function getEnvidoPoints() {
            const pts = ENVIDO_POINTS[gameState.envidoLevel];
            if (pts === 'falta') {
                // Falta envido: points needed to reach 30
                return 30 - Math.min(gameState.playerScore, gameState.botScore);
            }
            return pts;
        }

        function respondEnvido(quiero, isBot = false) {
            document.getElementById('envidoCallOverlay').classList.remove('active');

            if (quiero) {
                addChatMessage(isBot ? 'Bot dice: ¡Quiero!' : 'Decís: ¡Quiero!', 'envido');
                showSpeechBubble('¡Quiero!', isBot ? 'bot' : 'player', 'quiero-bubble');
            } else {
                addChatMessage(isBot ? 'Bot dice: No quiero' : 'Decís: No quiero', 'envido');
                showSpeechBubble('No quiero', isBot ? 'bot' : 'player', 'noquiero-bubble');
            }

            if (quiero) {
                gameState.envidoAccepted = true;
                const playerScore = calculateEnvidoScore(gameState.playerHand);
                const botScore = calculateEnvidoScore(gameState.botHand);
                const envidoPoints = getEnvidoPoints();

                document.getElementById('envidoPlayerScore').textContent = playerScore;
                document.getElementById('envidoBotScore').textContent = botScore;

                let winner = '';
                if (playerScore > botScore) {
                    gameState.playerScore += envidoPoints;
                    winner = `¡Ganaste el envido! (+${envidoPoints})`;
                    showScorePopup(envidoPoints.toString(), true);
                    showPointsBadge(envidoPoints, true);
                } else if (botScore > playerScore) {
                    gameState.botScore += envidoPoints;
                    winner = `Bot ganó el envido (+${envidoPoints})`;
                    showScorePopup(envidoPoints.toString(), false);
                    showPointsBadge(envidoPoints, false);
                } else {
                    // Tie: mano wins
                    if (gameState.mano === 0) {
                        gameState.playerScore += envidoPoints;
                        winner = `¡Ganaste el envido! (+${envidoPoints})`;
                        showScorePopup(envidoPoints.toString(), true);
                        showPointsBadge(envidoPoints, true);
                    } else {
                        gameState.botScore += envidoPoints;
                        winner = `Bot ganó el envido (+${envidoPoints})`;
                        showScorePopup(envidoPoints.toString(), false);
                        showPointsBadge(envidoPoints, false);
                    }
                }

                document.getElementById('envidoWinner').textContent = winner;
                document.getElementById('envidoRevealOverlay').classList.add('active');

                gameState.playerHasEnvidoOption = false;

                setTimeout(() => {
                    document.getElementById('envidoRevealOverlay').classList.remove('active');
                    gameState.turnPhase = 'round';
                    render();

                    if (gameState.playerScore >= 30 || gameState.botScore >= 30) {
                        endGame(gameState.playerScore >= 30 ? 0 : 1);
                    }

                    // Continue with game
                    if (gameState.mano === 1 && gameState.currentRound === 0 && gameState.currentRoundCards[0] === null) {
                        setTimeout(() => {
                            botPlayCard();
                        }, 800);
                    }
                }, 2500);
            } else {
                // No quiero: caller gets 1 point
                if (isBot) {
                    gameState.botScore += 1;
                    showScorePopup('1', false);
                } else {
                    gameState.playerScore += 1;
                    showScorePopup('1', true);
                }

                gameState.playerHasEnvidoOption = false;
                gameState.turnPhase = 'round';
                render();

                if (gameState.playerScore >= 30 || gameState.botScore >= 30) {
                    endGame(gameState.playerScore >= 30 ? 0 : 1);
                } else {
                    if (gameState.mano === 1 && gameState.currentRound === 0 && gameState.currentRoundCards[0] === null) {
                        setTimeout(() => {
                            botPlayCard();
                        }, 800);
                    }
                }
            }
        }

        // ============================================================================
        // TRUCO LOGIC
        // ============================================================================

        const TRUCO_NAMES = { 1: 'TRUCO', 2: 'RETRUCO', 3: 'VALE CUATRO' };
        const TRUCO_STAKES = { 1: 2, 2: 3, 3: 4 };

        function callTruco() {
            if (gameState.playerHasEnvidoOption) return;
            // Player can escalate if it was the bot who last called
            const nextLevel = gameState.trucoLevel + 1;
            if (nextLevel > 3) return;
            if (gameState.trucoLastCaller === 'player') return; // Can't re-raise yourself

            addChatMessage(`Cantás: ¡${TRUCO_NAMES[nextLevel]}!`, 'truco-msg');
            showSpeechBubble(`¡${TRUCO_NAMES[nextLevel]}!`, 'player', 'truco-bubble');
            gameState.trucoCalled = true;
            gameState.trucoLevel = nextLevel;
            gameState.pointsAtStake = TRUCO_STAKES[nextLevel];
            gameState.trucoLastCaller = 'player';
            gameState.trucoAccepted = false;
            gameState.turnPhase = 'truco_decision';

            setTimeout(() => {
                respondBotTruco();
            }, 1200);
        }

        function respondTruco(quiero) {
            // Player responding to bot's truco call
            document.getElementById('trucoCallOverlay').classList.remove('active');

            if (quiero) {
                addChatMessage('Decís: ¡Quiero!', 'truco-msg');
                showSpeechBubble('¡Quiero!', 'player', 'quiero-bubble');
                gameState.trucoAccepted = true;
                gameState.turnPhase = 'round';
                render();
            } else {
                addChatMessage('Decís: No quiero', 'truco-msg');
                showSpeechBubble('No quiero', 'player', 'noquiero-bubble');
                // Caller (bot) gets previous level points
                const points = gameState.trucoLevel === 1 ? 1 : TRUCO_STAKES[gameState.trucoLevel - 1];
                gameState.botScore += points;
                showScorePopup(points.toString(), false);
                addChatMessage(`Bot gana ${points} pts (no quiero)`, 'bot');

                gameState.turnPhase = 'round';
                render();

                if (gameState.botScore >= 30) {
                    endGame(1);
                } else {
                    // End hand, deal next
                    setTimeout(() => {
                        gameState.mano = 1 - gameState.mano;
                        dealHand();
                    }, 1500);
                }
            }
        }

        function respondBotTruco() {
            const strength = botEvaluateHandStrength();
            document.getElementById('trucoCallOverlay').classList.remove('active');

            // LOCO bot — accepts truco very liberally and re-raises aggressively
            let quiero = false;
            let reRaise = false;

            if (strength >= 0.6) {
                quiero = true;
                // Strong hand: high chance to re-raise immediately
                if (gameState.trucoLevel < 3 && Math.random() < 0.7) reRaise = true;
            } else if (strength >= 0.4) {
                quiero = true;
                // Decent hand: sometimes re-raise to intimidate
                if (gameState.trucoLevel < 3 && Math.random() < 0.4) reRaise = true;
            } else if (strength >= 0.25) {
                // Weak-ish: still accepts 60% of the time (loco!)
                quiero = Math.random() < 0.6;
                if (quiero && gameState.trucoLevel < 3 && Math.random() < 0.2) reRaise = true;
            } else {
                // Very weak: still bluff-accepts 20% of the time
                quiero = Math.random() < 0.2;
                if (quiero && gameState.trucoLevel < 3 && Math.random() < 0.15) reRaise = true;
            }

            if (quiero) {
                addChatMessage('Bot dice: ¡Quiero!', 'truco-msg');
                showSpeechBubble('¡Quiero!', 'bot', 'quiero-bubble');
                gameState.trucoAccepted = true;
                gameState.turnPhase = 'round';
                render();

                if (reRaise) {
                    setTimeout(() => {
                        const nextLevel = gameState.trucoLevel + 1;
                        addChatMessage(`Bot canta: ¡${TRUCO_NAMES[nextLevel]}!`, 'truco-msg');
                        showSpeechBubble(`¡${TRUCO_NAMES[nextLevel]}!`, 'bot', 'truco-bubble');
                        gameState.trucoLevel = nextLevel;
                        gameState.pointsAtStake = TRUCO_STAKES[nextLevel];
                        gameState.trucoLastCaller = 'bot';
                        gameState.trucoAccepted = false;
                        gameState.turnPhase = 'truco_decision';
                        document.getElementById('trucoCallTitle').textContent = TRUCO_NAMES[nextLevel];
                        document.getElementById('trucoCallMessage').textContent = `Bot cantó ${TRUCO_NAMES[nextLevel]}`;
                        document.getElementById('trucoCallOverlay').classList.add('active');
                        render();
                    }, 1200);
                }
            } else {
                addChatMessage('Bot dice: No quiero', 'truco-msg');
                showSpeechBubble('No quiero', 'bot', 'noquiero-bubble');
                const points = gameState.trucoLevel === 1 ? 1 : TRUCO_STAKES[gameState.trucoLevel - 1];
                gameState.playerScore += points;
                showScorePopup(points.toString(), true);
                addChatMessage(`Ganás ${points} pts (no quiero)`, 'player');

                gameState.turnPhase = 'round';
                render();

                if (gameState.playerScore >= 30) {
                    endGame(0);
                } else {
                    setTimeout(() => {
                        gameState.mano = 1 - gameState.mano;
                        dealHand();
                    }, 1500);
                }
            }
        }

        function goToMazo() {
            addChatMessage('Te fuiste al mazo', 'system');
            showSpeechBubble('Me voy al mazo', 'player', 'noquiero-bubble');
            // Player goes to mazo, bot gets remaining points
            gameState.botScore += gameState.pointsAtStake;
            showScorePopup(gameState.pointsAtStake.toString(), false);

            setTimeout(() => {
                if (gameState.botScore >= 30) {
                    endGame(1);
                } else {
                    gameState.mano = 1 - gameState.mano;
                    dealHand();
                }
            }, 1500);
        }

        // ============================================================================
        // RENDERING
        // ============================================================================

        function render() {
            renderScores();
            renderHand();
            renderBotHand();
            renderTable();
            renderTurnIndicator();
            renderButtons();
        }

        function renderBotHand(animate = false) {
            const botHandEl = document.getElementById('botHandDisplay');
            botHandEl.innerHTML = '';
            for (let i = 0; i < gameState.botHand.length; i++) {
                const back = document.createElement('div');
                back.className = 'card-back';
                if (animate) {
                    back.classList.add('dealing');
                    back.style.animationDelay = `${i * 0.15}s`;
                }
                botHandEl.appendChild(back);
            }
        }

        function renderScores() {
            document.getElementById('playerScore').textContent = gameState.playerScore;
            document.getElementById('botScore').textContent = gameState.botScore;
            document.getElementById('handNumber').textContent = `Mano ${gameState.handNumber}`;

            const playerPercent = Math.min((gameState.playerScore / 30) * 100, 100);
            const botPercent = Math.min((gameState.botScore / 30) * 100, 100);
            document.getElementById('scoreBarPlayer').style.width = playerPercent + '%';
            document.getElementById('scoreBarBot').style.width = botPercent + '%';

            let levelText = '';
            if (gameState.trucoLevel === 1) levelText = 'TRUCO (2)';
            else if (gameState.trucoLevel === 2) levelText = 'RETRUCO (3)';
            else if (gameState.trucoLevel === 3) levelText = 'VALE 4 (4)';
            document.getElementById('trucoLevel').textContent = levelText;
        }

        function renderHand(animate = false) {
            const playerHandEl = document.getElementById('playerHand');
            playerHandEl.innerHTML = '';

            for (let i = 0; i < gameState.playerHand.length; i++) {
                const card = gameState.playerHand[i];
                const cardEl = createCardElement(card, i, gameState.playedCards.includes(card));
                if (animate && !gameState.playedCards.includes(card)) {
                    cardEl.classList.add('dealing');
                    cardEl.style.animationDelay = `${i * 0.15}s`;
                }
                playerHandEl.appendChild(cardEl);
            }
        }

        function createCardElement(card, index, isPlayed = false) {
            const el = document.createElement('div');
            el.className = `card ${card.suit}${isPlayed ? ' played' : ' playable'}`;
            if (!isPlayed) {
                el.onclick = () => playCard(index);
            }

            // Top-left corner
            const tl = document.createElement('div');
            tl.className = 'card-corner-tl';
            tl.innerHTML = `<div class="card-value">${card.value}</div><div class="card-suit-small">${SUIT_SYMBOLS[card.suit]}</div>`;

            // Center suit (large)
            const center = document.createElement('div');
            center.className = 'card-center';
            center.textContent = SUIT_SYMBOLS[card.suit];

            // Bottom-right corner (same orientation, not inverted)
            const br = document.createElement('div');
            br.className = 'card-corner-br';
            br.innerHTML = `<div class="card-value">${card.value}</div><div class="card-suit-small">${SUIT_SYMBOLS[card.suit]}</div>`;

            el.appendChild(tl);
            el.appendChild(center);
            el.appendChild(br);
            return el;
        }

        function renderTable() {
            const tricksEl = document.getElementById('tricksDisplay');
            tricksEl.innerHTML = '';

            const roundLabels = ['1ra', '2da', '3ra'];

            for (let i = 0; i < gameState.tricks.length; i++) {
                const trick = gameState.tricks[i];
                const pairEl = document.createElement('div');
                pairEl.className = 'trick-pair';

                // Round label
                const label = document.createElement('div');
                label.className = 'trick-label';
                label.textContent = roundLabels[i];
                pairEl.appendChild(label);

                // Cards row
                const cardsRow = document.createElement('div');
                cardsRow.className = 'trick-cards-row';

                const isPlayerWin = trick.winner === 0;
                const isBotWin = trick.winner === 1;
                const isParda = trick.winner === 2;

                const playerCardEl = createTrickCardElement(trick.player,
                    isPlayerWin ? 'winner-card' : (isParda ? 'parda-card' : ''));
                const vs = document.createElement('div');
                vs.className = 'trick-vs';
                vs.textContent = 'vs';
                const botCardEl = createTrickCardElement(trick.bot,
                    isBotWin ? 'winner-card' : (isParda ? 'parda-card' : ''));

                cardsRow.appendChild(playerCardEl);
                cardsRow.appendChild(vs);
                cardsRow.appendChild(botCardEl);
                pairEl.appendChild(cardsRow);

                // Result text
                const result = document.createElement('div');
                result.className = 'trick-result ' +
                    (isPlayerWin ? 'player-win' : (isBotWin ? 'bot-win' : 'parda'));
                result.textContent = isPlayerWin ? 'Ganaste' : (isBotWin ? 'Bot gana' : 'Parda');
                pairEl.appendChild(result);

                tricksEl.appendChild(pairEl);
            }

            const roundEl = document.getElementById('currentRoundDisplay');
            roundEl.innerHTML = '';

            if (gameState.currentRound < 3) {
                // Show current round label
                if (gameState.currentRoundCards[0] || gameState.currentRoundCards[1]) {
                    const curLabel = document.createElement('div');
                    curLabel.style.cssText = 'font-size:0.7rem; color:#666; letter-spacing:1px; margin-right:10px;';
                    curLabel.textContent = roundLabels[gameState.currentRound] || '';
                    roundEl.appendChild(curLabel);
                }

                if (gameState.currentRoundCards[0]) {
                    roundEl.appendChild(createRoundCardElement(gameState.currentRoundCards[0]));
                }

                // Show VS between cards
                if (gameState.currentRoundCards[0] || gameState.currentRoundCards[1]) {
                    const vsEl = document.createElement('div');
                    vsEl.className = 'vs-text';
                    vsEl.textContent = 'vs';
                    roundEl.appendChild(vsEl);
                }

                if (gameState.currentRoundCards[1]) {
                    roundEl.appendChild(createRoundCardElement(gameState.currentRoundCards[1]));
                }
            }
        }

        function createTrickCardElement(card, extraClass = '') {
            const el = document.createElement('div');
            el.className = `trick-card ${card.suit} ${extraClass}`;
            el.innerHTML = `
                <div style="font-size: 0.65rem; font-weight:bold;">${card.value}</div>
                <div style="font-size: 0.9rem;">${SUIT_SYMBOLS[card.suit]}</div>
            `;
            el.style.color = getCardColor(card.suit);
            return el;
        }

        function createRoundCardElement(card) {
            const el = document.createElement('div');
            el.className = 'round-card';
            el.style.color = getCardColor(card.suit);
            el.innerHTML = `
                <div class="card-corner-tl">
                    <div class="card-value" style="font-size:0.95rem;">${card.value}</div>
                    <div class="card-suit-small" style="font-size:0.8rem;">${SUIT_SYMBOLS[card.suit]}</div>
                </div>
                <div class="card-center" style="font-size:2.2rem;">${SUIT_SYMBOLS[card.suit]}</div>
                <div class="card-corner-br">
                    <div class="card-value" style="font-size:0.95rem;">${card.value}</div>
                    <div class="card-suit-small" style="font-size:0.8rem;">${SUIT_SYMBOLS[card.suit]}</div>
                </div>
            `;
            return el;
        }

        function getCardColor(suit) {
            const colors = {
                espadas: '#1a5a8c',
                bastos: '#1a6a30',
                copas: '#a02040',
                oros: '#b08018'
            };
            return colors[suit] || '#2a1a0a';
        }

        function renderTurnIndicator() {
            const indicator = document.getElementById('turnIndicator');
            if (gameState.currentRound >= 3) {
                indicator.textContent = '';
            } else if (gameState.currentRoundCards[0] !== null && gameState.currentRoundCards[1] === null) {
                // Player played, waiting for bot
                indicator.textContent = '⌛ BOT JUGANDO';
            } else if (gameState.currentRoundCards[1] !== null && gameState.currentRoundCards[0] === null) {
                // Bot led, waiting for player response
                indicator.textContent = '▲ TU TURNO — respondé con una carta';
            } else if (gameState.currentRoundCards[0] === null && gameState.currentRoundCards[1] === null) {
                if (gameState.mano === 0 || gameState.currentRoundLeader === 0) {
                    indicator.textContent = '▲ TU TURNO';
                } else {
                    indicator.textContent = '⌛ BOT JUGANDO';
                }
            } else {
                indicator.textContent = '';
            }
        }

        function renderButtons() {
            const envidoBtn = document.getElementById('envidoBtn');
            const trucoBtn = document.getElementById('trucoBtn');
            const mazoBtn = document.getElementById('mazoBtn');

            const inDecision = gameState.turnPhase === 'envido_decision' || gameState.turnPhase === 'truco_decision';
            envidoBtn.disabled = gameState.envidoCalled || gameState.currentRound > 0 || gameState.playerHasEnvidoOption === false || inDecision;

            // Truco button: can escalate if bot was the last caller and level < 3
            const canEscalate = gameState.trucoLastCaller === 'bot' && gameState.trucoLevel < 3 && gameState.trucoAccepted;
            const canInitialTruco = !gameState.trucoCalled && !gameState.playerHasEnvidoOption;
            trucoBtn.disabled = !(canInitialTruco || canEscalate) || inDecision;

            // Update truco button label
            const nextLevel = gameState.trucoLevel + 1;
            if (canEscalate && TRUCO_NAMES[nextLevel]) {
                trucoBtn.textContent = TRUCO_NAMES[nextLevel];
            } else if (!gameState.trucoCalled) {
                trucoBtn.textContent = 'TRUCO';
            } else {
                trucoBtn.textContent = TRUCO_NAMES[gameState.trucoLevel] || 'TRUCO';
            }

            mazoBtn.disabled = inDecision;
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showTableAnnouncement(mainText, subText, styleClass, duration = 1800) {
            const felt = document.querySelector('.table-felt');
            if (!felt) return;
            // Remove any existing announcement
            const old = felt.querySelector('.table-announcement');
            if (old) old.remove();

            const el = document.createElement('div');
            el.className = `table-announcement ${styleClass}`;
            el.innerHTML = `
                <div class="announce-text">${mainText}</div>
                ${subText ? `<div class="announce-subtext">${subText}</div>` : ''}
            `;
            felt.appendChild(el);

            // Fade out before removing
            setTimeout(() => el.classList.add('fade-out'), duration - 500);
            setTimeout(() => el.remove(), duration);
        }

        function showPointsBadge(points, isPlayer) {
            const felt = document.querySelector('.table-felt');
            if (!felt) return;
            const badge = document.createElement('div');
            badge.className = `points-badge ${isPlayer ? 'player-pts' : 'bot-pts'}`;
            badge.textContent = `+${points}`;
            felt.appendChild(badge);
            setTimeout(() => badge.remove(), 2000);
        }

        function showScorePopup(text, isPlayer) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+' + text;
            popup.style.color = isPlayer ? '#d4a843' : '#c0c0c0';
            popup.style.left = isPlayer ? '100px' : 'calc(100% - 100px)';
            popup.style.top = '80px';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // ============================================================================
        // CHAT / EVENT LOG
        // ============================================================================

        function addChatMessage(text, type = 'system') {
            const container = document.getElementById('chatMessages');
            if (!container) return;
            const msg = document.createElement('div');
            msg.className = 'chat-msg ' + type;
            msg.textContent = text;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
            // Keep only last 50 messages
            while (container.children.length > 50) {
                container.removeChild(container.firstChild);
            }
        }

        // ============================================================================
        // SPEECH BUBBLES
        // ============================================================================

        function showSpeechBubble(text, who, style = '') {
            // who: 'player' or 'bot'
            // style: 'envido-bubble', 'truco-bubble', 'quiero-bubble', 'noquiero-bubble'
            const bubble = document.createElement('div');
            bubble.className = `speech-bubble ${who}-bubble ${style}`;
            bubble.textContent = text;
            document.body.appendChild(bubble);
            setTimeout(() => bubble.remove(), 2500);
        }

        function clearChat() {
            const container = document.getElementById('chatMessages');
            if (container) container.innerHTML = '';
        }

        // Player chat + bot replies
        const BOT_REPLIES = [
            '¿Querés truco? Dale nomás.',
            'Jugá tranquilo, yo ya gané.',
            'Esa carta estaba floja, eh.',
            'Mirá que soy mano...',
            'No te hagas el vivo.',
            'Envido y truco, ¡todo junto!',
            'Shh, dejame pensar.',
            '¿Eso es lo mejor que tenés?',
            'Yo con un 4 de copas te gano.',
            'Dale, apurá que se enfría.',
            'Jajaja, ¡vamos!',
            'A este paso te como crudo.',
            'Ojo que la vuelta no perdono.',
            'Cantá nomás, yo quiero todo.',
            '¡Qué lindo truco!',
            'Seguí jugando así que me conviene.',
            'Hoy estoy picante.',
            'Te falta calle, pibe.',
        ];

        function sendPlayerChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            addChatMessage('Vos: ' + text, 'player');
            input.value = '';

            // Bot replies after a short delay
            setTimeout(() => {
                const reply = BOT_REPLIES[Math.floor(Math.random() * BOT_REPLIES.length)];
                addChatMessage('Bot: ' + reply, 'bot');
                showSpeechBubble(reply.length > 25 ? reply.substring(0, 25) + '...' : reply, 'bot', '');
            }, 600 + Math.random() * 1000);
        }

        // Enter key sends message
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('chatInput');
            if (input) {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendPlayerChat();
                    }
                });
            }
        });
    </script>

        const waves = [
            { y: 0.85, amp: 45, freq: 0.008, speed: 0.012, color: 'rgba(212, 168, 67, 0.12)', lineColor: 'rgba(212, 168, 67, 0.35)', lineWidth: 1.5 },
            { y: 0.80, amp: 55, freq: 0.006, speed: -0.009, color: 'rgba(212, 168, 67, 0.08)', lineColor: 'rgba(212, 168, 67, 0.25)', lineWidth: 1.2 },
            { y: 0.70, amp: 35, freq: 0.010, speed: 0.015, color: 'rgba(196, 90, 106, 0.10)', lineColor: 'rgba(196, 90, 106, 0.30)', lineWidth: 1.5 },
            { y: 0.60, amp: 50, freq: 0.007, speed: -0.011, color: 'rgba(196, 90, 106, 0.06)', lineColor: 'rgba(196, 90, 106, 0.20)', lineWidth: 1 },
            { y: 0.45, amp: 40, freq: 0.009, speed: 0.008, color: 'rgba(30, 90, 46, 0.10)', lineColor: 'rgba(30, 90, 46, 0.30)', lineWidth: 1.5 },
            { y: 0.35, amp: 30, freq: 0.012, speed: -0.014, color: 'rgba(30, 90, 46, 0.06)', lineColor: 'rgba(30, 90, 46, 0.18)', lineWidth: 1 },
            { y: 0.20, amp: 35, freq: 0.008, speed: 0.010, color: 'rgba(192, 192, 192, 0.05)', lineColor: 'rgba(192, 192, 192, 0.15)', lineWidth: 1 },
            { y: 0.10, amp: 25, freq: 0.011, speed: -0.007, color: 'rgba(212, 168, 67, 0.04)', lineColor: 'rgba(212, 168, 67, 0.12)', lineWidth: 0.8 },
        ];

        let t = 0;

        function drawWave(wave) {
            const baseY = wave.y * h;
            const phase = t * wave.speed;

            // Fill below the wave
            ctx.beginPath();
            ctx.moveTo(0, h);
            for (let x = 0; x <= w; x += 3) {
                const y = baseY +
                    Math.sin(x * wave.freq + phase) * wave.amp +
                    Math.sin(x * wave.freq * 0.5 + phase * 1.3) * wave.amp * 0.4;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h);
            ctx.closePath();
            ctx.fillStyle = wave.color;
            ctx.fill();

            // Draw the wave line on top
            ctx.beginPath();
            for (let x = 0; x <= w; x += 2) {
                const y = baseY +
                    Math.sin(x * wave.freq + phase) * wave.amp +
                    Math.sin(x * wave.freq * 0.5 + phase * 1.3) * wave.amp * 0.4;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = wave.lineColor;
            ctx.lineWidth = wave.lineWidth;
            ctx.stroke();
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            // Draw waves back to front (topmost wave index drawn last)
            for (let i = waves.length - 1; i >= 0; i--) {
                drawWave(waves[i]);
            }
            t += 1;
            requestAnimationFrame(animate);
        }

        animate();
    })();
    </script>
