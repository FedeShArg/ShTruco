<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUCO - Argentine Card Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #000000;
            color: #f5e6c8;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* === WAVE CANVAS — rendered via JS below === */
        .wave-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Trippy-bg and blobs are now replaced by canvas waves */
        .trippy-bg { display: none; }
        .blob { display: none; }

        /* CRT scanlines — subtle for casino feel */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
        .crt-overlay::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.04) 0px,
                rgba(0, 0, 0, 0.04) 1px,
                transparent 1px,
                transparent 4px
            );
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(18, 16, 16, 0);
            animation: crtFlicker 0.15s infinite;
        }

        @keyframes crtFlicker {
            0%  { opacity: 0.015; }
            50% { opacity: 0.025; }
            100%{ opacity: 0.015; }
        }

        /* Vignette */
        .crt-vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
        }

        .screen.active {
            text-shadow: none;
        }

        /* Gold sparkle particles */
        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.1; }
            50% { transform: translateY(-20px) translateX(8px); opacity: 0.4; }
        }

        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: radial-gradient(circle, #d4a843, transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        .particle.p1 { animation: float 8s ease-in-out infinite; }
        .particle.p2 { animation: float 10s ease-in-out infinite 1s; }
        .particle.p3 { animation: float 12s ease-in-out infinite 2s; }
        .particle.p4 { animation: float 9s ease-in-out infinite 0.5s; }
        .particle.p5 { animation: float 11s ease-in-out infinite 1.5s; }
        .particle.p6 { animation: float 13s ease-in-out infinite 2.5s; }

        /* Screen management */
        .screen {
            display: none;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .screen.active {
            display: flex;
        }

        /* MENU SCREEN */
        #menuScreen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        .menu-title {
            font-size: 7rem;
            font-weight: bold;
            background: linear-gradient(135deg, #d4a843, #f0d78c, #d4a843, #a67c2e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px rgba(212, 168, 67, 0.4));
            margin-bottom: 10px;
            letter-spacing: 12px;
            animation: pulse 3s ease-in-out infinite;
            font-family: 'Georgia', serif;
        }

        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(212, 168, 67, 0.4)); }
            50% { filter: drop-shadow(0 0 50px rgba(212, 168, 67, 0.7)); }
        }

        .menu-subtitle {
            font-size: 1.2rem;
            color: #a08860;
            margin-bottom: 60px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-style: italic;
        }

        .menu-cards-container {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
            perspective: 1000px;
        }

        .menu-card {
            width: 90px;
            height: 135px;
            background: linear-gradient(145deg, #1a0f08, #2a1a10, #1a0f08);
            border: 2px solid #d4a843;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: menuCardFloat 3s ease-in-out infinite;
            transform-style: preserve-3d;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(212, 168, 67, 0.08);
        }

        .menu-card:nth-child(1) { animation-delay: 0s; color: #7cb3e0; }
        .menu-card:nth-child(2) { animation-delay: 0.5s; color: #6ab87a; }
        .menu-card:nth-child(3) { animation-delay: 1s; color: #d4a843; }
        .menu-card:nth-child(4) { animation-delay: 1.5s; color: #c45a6a; }

        @keyframes menuCardFloat {
            0%, 100% { transform: rotateY(0deg) translateY(0px); }
            50% { transform: rotateY(15deg) translateY(-15px); }
        }

        .menu-button {
            padding: 16px 55px;
            font-size: 1.3rem;
            font-family: 'Georgia', serif;
            font-weight: bold;
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.15), rgba(212, 168, 67, 0.05));
            border: 2px solid #d4a843;
            color: #d4a843;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            box-shadow: 0 0 25px rgba(212, 168, 67, 0.2), inset 0 0 20px rgba(212, 168, 67, 0.05);
            text-transform: uppercase;
            border-radius: 4px;
        }

        .menu-button:hover {
            background: linear-gradient(180deg, rgba(212, 168, 67, 0.25), rgba(212, 168, 67, 0.1));
            box-shadow: 0 0 45px rgba(212, 168, 67, 0.5), inset 0 0 25px rgba(212, 168, 67, 0.1);
            transform: scale(1.04);
        }

        /* GAME SCREEN */
        #gameScreen {
            flex-direction: column;
            background: transparent;
            padding: 15px 20px;
            overflow: hidden;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 60px;
            min-height: 60px;
            flex-shrink: 0;
        }

        .player-score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #d4a843;
            letter-spacing: 3px;
            text-shadow: 0 0 12px rgba(212, 168, 67, 0.3);
        }

        .hand-info {
            text-align: center;
            font-size: 1.1rem;
            color: #a08860;
        }

        .hand-info .hand-number {
            font-size: 0.9rem;
            color: #8a7050;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .truco-level {
            font-size: 0.9rem;
            color: #c45a6a;
            margin-top: 5px;
            font-weight: bold;
        }

        .bot-score {
            font-size: 2.5rem;
            font-weight: bold;
            color: #c0c0c0;
            letter-spacing: 3px;
            text-shadow: 0 0 12px rgba(192, 192, 192, 0.3);
        }

        .score-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #3a2a18;
            margin-bottom: 10px;
            position: relative;
            display: flex;
            flex-shrink: 0;
            border-radius: 3px;
            overflow: hidden;
        }

        .score-bar-player {
            height: 100%;
            background: linear-gradient(90deg, #a67c2e, #d4a843, #f0d78c);
            transition: width 0.5s ease;
            box-shadow: 0 0 8px rgba(212, 168, 67, 0.5);
        }

        .score-bar-bot {
            height: 100%;
            background: linear-gradient(90deg, #888, #c0c0c0, #e0e0e0);
            transition: width 0.5s ease;
            box-shadow: 0 0 8px rgba(192, 192, 192, 0.4);
            margin-left: auto;
        }

        .game-middle {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            padding: 10px 0;
            min-height: 0;
        }

        .bot-hand-display {
            display: flex;
            gap: 30px;
            height: 130px;
            min-height: 130px;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .card-back {
            width: 85px;
            height: 125px;
            background: linear-gradient(145deg, #8b1c30, #5c1220, #8b1c30);
            border: 2px solid #d4a843;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #d4a843;
            position: relative;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(139, 28, 48, 0.3);
        }

        .card-back::before {
            content: 'Sh!';
            position: absolute;
            font-size: 1.3rem;
            font-family: 'Georgia', serif;
            font-style: italic;
            color: #d4a843;
            opacity: 0.85;
            text-shadow: 0 0 8px rgba(212, 168, 67, 0.4);
        }

        .card-back::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(212, 168, 67, 0.25);
            border-radius: 5px;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 6px,
                rgba(212, 168, 67, 0.04) 6px,
                rgba(212, 168, 67, 0.04) 12px
            );
            pointer-events: none;
        }

        .table-felt {
            width: 100%;
            max-width: 900px;
            height: 280px;
            min-height: 280px;
            max-height: 280px;
            background: radial-gradient(ellipse at center, #1e5a2e, #174822, #0e3018);
            border: 4px solid #3a2a18;
            border-radius: 20px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 10px 20px;
            box-shadow:
                inset 0 0 40px rgba(0, 0, 0, 0.6),
                inset 0 0 80px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(0, 0, 0, 0.5),
                0 0 1px 1px rgba(212, 168, 67, 0.15);
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        /* Tricks on the left side */
        .tricks-display {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
            align-items: center;
            align-self: center;
        }

        .trick-pair {
            display: flex;
            gap: 5px;
        }

        .trick-card {
            width: 38px;
            height: 54px;
            font-size: 0.65rem;
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }

        /* Current round in the center */
        .current-round-display {
            display: flex;
            gap: 24px;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
        }

        .round-card {
            width: 85px;
            height: 120px;
            position: relative;
            animation: roundCardAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(145deg, #f5f0e0, #ebe3cc);
            border: 2px solid #c8b080;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.5);
        }

        @keyframes cardFlip {
            0% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        /* Card deal animation — slides up from below with fan-out */
        @keyframes cardDeal {
            0% { transform: translateY(120px) scale(0.6) rotateZ(10deg); opacity: 0; }
            60% { transform: translateY(-10px) scale(1.02) rotateZ(-1deg); opacity: 1; }
            100% { transform: translateY(0) scale(1) rotateZ(0deg); opacity: 1; }
        }

        .card.dealing {
            animation: cardDeal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        /* Bot card deal — slides down from above */
        @keyframes botCardDeal {
            0% { transform: translateY(-100px) scale(0.6); opacity: 0; }
            60% { transform: translateY(5px) scale(1.02); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .card-back.dealing {
            animation: botCardDeal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        /* Card play — flies to table */
        @keyframes cardPlayToTable {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1) translateY(-30px); opacity: 0.9; }
            100% { transform: scale(0.8) translateY(-60px); opacity: 0; }
        }

        .card.playing-to-table {
            animation: cardPlayToTable 0.4s ease-in forwards;
            pointer-events: none;
        }

        /* Round card appear with bounce */
        @keyframes roundCardAppear {
            0% { transform: scale(0.3) rotateY(90deg); opacity: 0; }
            50% { transform: scale(1.1) rotateY(10deg); opacity: 1; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }

        /* roundCardAppear applied directly on .round-card rule above */

        /* Table announcement overlay — shows trick/hand results on the felt */
        .table-announcement {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            animation: announceFadeIn 0.3s ease-out;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 20px;
        }

        .table-announcement.fade-out {
            animation: announceFadeOut 0.5s ease-in forwards;
        }

        .announce-text {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
        }

        .announce-subtext {
            font-size: 0.85rem;
            margin-top: 4px;
            letter-spacing: 2px;
            opacity: 0.85;
        }

        .announce-player { color: #d4a843; }
        .announce-bot { color: #c0c0c0; }
        .announce-parda { color: #d4a843; }
        .announce-points { color: #d4a843; }

        @keyframes announceFadeIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes announceFadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }

        /* Points badge — floating +N on the table */
        .points-badge {
            position: absolute;
            bottom: 10px;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none;
            animation: pointsBadgeAnim 2s ease-out forwards;
            z-index: 11;
        }

        .points-badge.player-pts {
            left: 20%;
            color: #d4a843;
        }

        .points-badge.bot-pts {
            right: 20%;
            color: #c0c0c0;
        }

        @keyframes pointsBadgeAnim {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            30% { transform: translateY(-15px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-40px) scale(1); opacity: 0; }
        }

        .vs-text {
            color: #d4a843;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            height: 50px;
            min-height: 50px;
            align-items: center;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 10px 25px;
            font-size: 0.95rem;
            font-family: 'Georgia', serif;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid;
            color: inherit;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .action-btn.envido {
            border-color: #d4a843;
            color: #d4a843;
            box-shadow: 0 0 12px rgba(212, 168, 67, 0.2);
        }

        .action-btn.envido:hover:not(:disabled) {
            background: rgba(212, 168, 67, 0.15);
            box-shadow: 0 0 25px rgba(212, 168, 67, 0.5);
        }

        .action-btn.truco {
            border-color: #c45a6a;
            color: #c45a6a;
            box-shadow: 0 0 12px rgba(196, 90, 106, 0.2);
        }

        .action-btn.truco:hover:not(:disabled) {
            background: rgba(196, 90, 106, 0.15);
            box-shadow: 0 0 25px rgba(196, 90, 106, 0.5);
        }

        .action-btn.mazo {
            border-color: #8a7050;
            color: #8a7050;
            box-shadow: 0 0 10px rgba(138, 112, 80, 0.15);
        }

        .action-btn.mazo:hover:not(:disabled) {
            background: rgba(138, 112, 80, 0.15);
            box-shadow: 0 0 20px rgba(138, 112, 80, 0.4);
        }

        .action-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .player-hand {
            display: flex;
            gap: 40px;
            perspective: 1000px;
            position: relative;
            z-index: 50;
            height: 180px;
            min-height: 180px;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card {
            width: 120px;
            height: 175px;
            background: linear-gradient(145deg, #f5f0e0, #ebe3cc, #f5f0e0);
            border: 2px solid #c8b080;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #2a1a0a;
            font-weight: bold;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .card.playable:hover {
            transform: translateY(-20px) scale(1.08);
            box-shadow: 0 15px 40px rgba(212, 168, 67, 0.5), 0 5px 15px rgba(0,0,0,0.4);
            border-color: #d4a843;
        }

        .card.played {
            opacity: 0.35;
            pointer-events: none;
            cursor: default;
        }

        /* Top-left corner: value + suit */
        .card-corner-tl {
            position: absolute;
            top: 8px;
            left: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            line-height: 1;
        }

        /* Bottom-right corner: value + suit (NOT inverted) */
        .card-corner-br {
            position: absolute;
            bottom: 8px;
            right: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            line-height: 1;
        }

        .card-value {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .card-suit-small {
            font-size: 0.95rem;
        }

        .card-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            opacity: 0.85;
        }

        /* Card colors — rich on cream background */
        .card.espadas, .card.espadas .card-suit { color: #1a5a8c; }
        .card.bastos, .card.bastos .card-suit { color: #1a6a30; }
        .card.copas, .card.copas .card-suit { color: #a02040; }
        .card.oros, .card.oros .card-suit { color: #b08018; }

        .card.espadas::before { border-left-color: #1a5a8c; }
        .card.bastos::before { border-left-color: #1a6a30; }
        .card.copas::before { border-left-color: #a02040; }
        .card.oros::before { border-left-color: #b08018; }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 50%);
            border-radius: 8px;
            pointer-events: none;
            border-left: 3px solid;
        }

        .turn-indicator {
            color: #d4a843;
            font-size: 0.85rem;
            letter-spacing: 2px;
            height: 25px;
            min-height: 25px;
            display: flex;
            align-items: center;
            animation: blink 1s ease-in-out infinite;
            flex-shrink: 0;
            font-family: 'Georgia', serif;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Call overlays */
        .call-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, rgba(20, 10, 5, 0.97), rgba(40, 20, 15, 0.97));
            border: 2px solid #d4a843;
            border-radius: 12px;
            padding: 40px 50px;
            text-align: center;
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: callAppear 0.4s ease-out;
            min-width: 420px;
            box-shadow: 0 0 60px rgba(212, 168, 67, 0.15), 0 0 120px rgba(0, 0, 0, 0.8);
        }

        .call-overlay::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 13px;
            background: linear-gradient(135deg, rgba(212, 168, 67, 0.2), rgba(139, 28, 48, 0.2));
            z-index: -1;
            filter: blur(20px);
        }

        @keyframes callAppear {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .call-overlay.active {
            display: flex;
        }

        .call-title {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 0 0 20px currentColor;
        }

        .call-message {
            font-size: 1rem;
            color: #aaa;
        }

<body>

            <button class="call-btn no-quiero" onclick="respondTruco(false)">NO QUIERO</button>
        </div>
    </div>

    <div class="envido-reveal" id="envidoRevealOverlay">
        <div style="font-size: 1.5rem; letter-spacing: 2px; color: #d4a843; font-family: Georgia, serif;">ENVIDO</div>
        <div class="envido-scores">
            <div>
                <div style="font-size: 0.9rem; color: #999; margin-bottom: 10px;">TÚ</div>
                <div class="envido-score-player" id="envidoPlayerScore">0</div>
            </div>
            <div>
                <div style="font-size: 0.9rem; color: #999; margin-bottom: 10px;">BOT</div>
                <div class="envido-score-bot" id="envidoBotScore">0</div>
            </div>
        </div>
