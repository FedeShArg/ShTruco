<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUCO Sh! — Multiplayer</title>
    <style>
        /* ============================================================
           TRUCO Sh! MULTIPLAYER CLIENT — Casino Theme
           ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #d4a843;
            --gold-light: #e8c96a;
            --silver: #c0c0c0;
            --burgundy: #8b1c30;
            --burgundy-light: #c45a6a;
            --cream: #f5f0e0;
            --felt-green: #1a5c2a;
            --felt-dark: #0e3818;
            --bg: #000000;
            --text: #e8dcc8;
            --text-dim: #8a7e6b;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Canvas background */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* CRT scanlines */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
        }
        .crt-overlay::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.04) 0px,
                rgba(0,0,0,0.04) 1px,
                transparent 1px,
                transparent 4px
            );
        }
        .crt-overlay::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(18,16,16,0);
            animation: crtFlicker 0.15s infinite;
        }
        @keyframes crtFlicker {
            0%  { opacity: 0.015; }
            50% { opacity: 0.025; }
            100%{ opacity: 0.015; }
        }
        /* Vignette */
        .crt-vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
        }
        /* Gold sparkle particles */
        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.1; }
            50% { transform: translateY(-20px) translateX(8px); opacity: 0.4; }
        }
        .particle {
            position: fixed;
            width: 2px; height: 2px;
            background: radial-gradient(circle, #d4a843, transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        .particle.p1 { animation: float 8s ease-in-out infinite; }
        .particle.p2 { animation: float 10s ease-in-out infinite 1s; }
        .particle.p3 { animation: float 12s ease-in-out infinite 2s; }
        .particle.p4 { animation: float 9s ease-in-out infinite 0.5s; }
        .particle.p5 { animation: float 11s ease-in-out infinite 1.5s; }
        .particle.p6 { animation: float 7s ease-in-out infinite 3s; }

        /* All screens */
        .screen {
            display: none;
            position: relative;
            z-index: 2;
            min-height: 100vh;
        }
        .screen.active { display: flex; }

        /* ---- AUTH SCREEN ---- */
        #authScreen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 10px;
        }
        .auth-logo h1 {
            font-size: 3em;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(212,168,67,0.5);
            letter-spacing: 4px;
        }
        .auth-logo .subtitle {
            color: var(--burgundy-light);
            font-style: italic;
            font-size: 1.1em;
            margin-top: 4px;
        }

        .auth-box {
            background: rgba(20,10,5,0.85);
            border: 1px solid var(--gold);
            border-radius: 12px;
            padding: 30px;
            width: 380px;
            max-width: 90vw;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(212,168,67,0.3);
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            color: var(--text-dim);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .auth-tab.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            color: var(--gold);
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,168,67,0.3);
            border-radius: 6px;
            color: var(--text);
            font-family: Georgia, serif;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: var(--gold);
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            border: 1px solid var(--gold);
            background: linear-gradient(135deg, rgba(212,168,67,0.2), rgba(139,28,48,0.2));
            color: var(--gold);
            font-family: Georgia, serif;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            background: linear-gradient(135deg, rgba(212,168,67,0.4), rgba(139,28,48,0.4));
            box-shadow: 0 0 15px rgba(212,168,67,0.3);
        }
        .btn-full { width: 100%; }
        .btn-burgundy {
            border-color: var(--burgundy-light);
            color: var(--burgundy-light);
        }
        .btn-silver {
            border-color: var(--silver);
            color: var(--silver);
        }
        .btn-green {
            border-color: #4a4; color: #4a4;
        }
        .btn-small { padding: 6px 14px; font-size: 0.85em; }
        .btn-ready {
            border-color: #5a5;
            color: #5a5;
            background: rgba(50,150,50,0.15);
        }
        .btn-ready.is-ready {
            background: rgba(50,150,50,0.4);
            box-shadow: 0 0 10px rgba(50,150,50,0.3);
        }

        .auth-error {
            color: var(--burgundy-light);
            font-size: 0.85em;
            margin-top: 8px;
            min-height: 1.2em;
        }

        /* ---- LOBBY SCREEN ---- */
        #lobbyScreen {
            flex-direction: column;
            padding: 20px;
            gap: 16px;
        }

        .lobby-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .lobby-header h2 {
            color: var(--gold);
            font-size: 1.6em;
        }
        .lobby-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .lobby-username {
            color: var(--gold-light);
            font-size: 1.1em;
        }
        .lobby-stats {
            color: var(--text-dim);
            font-size: 0.85em;
        }
        .online-count {
            color: var(--silver);
            font-size: 0.85em;
        }

        .lobby-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .rooms-list {
            flex: 1;
            min-height: 200px;
        }
        .rooms-list h3 {
            color: var(--silver);
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .room-card {
            background: rgba(20,10,5,0.75);
            border: 1px solid rgba(212,168,67,0.2);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
            cursor: pointer;
        }
        .room-card:hover {
            border-color: var(--gold);
            background: rgba(212,168,67,0.08);
        }
        .room-info {
            flex: 1;
        }
        .room-name {
            color: var(--gold-light);
            font-size: 1.05em;
        }
        .room-meta {
            color: var(--text-dim);
            font-size: 0.85em;
            margin-top: 3px;
        }
        .room-actions {
            display: flex;
            gap: 8px;
        }

        .no-rooms {
            color: var(--text-dim);
            font-style: italic;
            padding: 30px;
            text-align: center;
        }

        /* Create room modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: rgba(20,10,5,0.95);
            border: 1px solid var(--gold);
            border-radius: 12px;
            padding: 30px;
            width: 400px;
            max-width: 90vw;
        }
        .modal h3 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .radio-option {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(212,168,67,0.3);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.3s;
        }
        .radio-option.selected {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(212,168,67,0.1);
        }

        /* ---- ROOM SCREEN ---- */
        #roomScreen {
            flex-direction: column;
            padding: 20px;
            gap: 16px;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-title {
            color: var(--gold);
            font-size: 1.4em;
        }

        .teams-display {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .team-box {
            background: rgba(20,10,5,0.75);
            border: 1px solid rgba(212,168,67,0.2);
            border-radius: 8px;
            padding: 20px;
            min-width: 200px;
            text-align: center;
        }
        .team-box.team-0 { border-color: rgba(212,168,67,0.4); }
        .team-box.team-1 { border-color: rgba(192,192,192,0.4); }
        .team-label {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .team-0 .team-label { color: var(--gold); }
        .team-1 .team-label { color: var(--silver); }

        .team-player {
            padding: 6px 0;
            color: var(--text);
        }
        .team-player.ready { color: #5a5; }
        .team-player .ready-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #333;
            margin-right: 6px;
        }
        .team-player.ready .ready-dot { background: #5a5; }
        .team-player.is-you { font-weight: bold; }

        .empty-slot {
            color: var(--text-dim);
            font-style: italic;
            padding: 6px 0;
        }

        .room-actions-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .spectators-bar {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85em;
        }

        /* ---- GAME SCREEN ---- */
        #gameScreen {
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            padding: 8px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: rgba(20,10,5,0.7);
            border: 1px solid rgba(212,168,67,0.2);
            border-radius: 6px;
            flex-shrink: 0;
        }
        .game-score {
            font-size: 1.1em;
        }
        .score-you { color: var(--gold); }
        .score-them { color: var(--silver); }
        .game-hand-info { color: var(--text-dim); font-size: 0.85em; }

        .opponent-area {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 8px 0;
            min-height: 80px;
            flex-shrink: 0;
        }
        .opp-hand-fan {
            display: flex;
            position: relative;
            height: 90px;
            width: 100px;
            justify-content: center;
        }
        .opp-hand-fan .card-back {
            position: absolute;
            width: 60px;
            height: 88px;
            transform-origin: bottom center;
        }
        .opp-hand-fan .card-back:nth-child(1) { transform: rotate(-12deg) translateX(-18px); z-index: 1; }
        .opp-hand-fan .card-back:nth-child(2) { transform: rotate(0deg); z-index: 2; }
        .opp-hand-fan .card-back:nth-child(3) { transform: rotate(12deg) translateX(18px); z-index: 3; }

        .card-back {
            width: 85px;
            height: 125px;
            background: linear-gradient(145deg, #8b1c30, #5c1220, #8b1c30);
            border: 2px solid #d4a843;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #d4a843;
            position: relative;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 20px rgba(139,28,48,0.3);
        }
        .card-back::before {
            content: 'Sh!';
            position: absolute;
            font-size: 1.3rem;
            font-family: Georgia, serif;
            font-style: italic;
            color: #d4a843;
            opacity: 0.85;
            text-shadow: 0 0 8px rgba(212,168,67,0.4);
        }
        .card-back::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid rgba(212,168,67,0.25);
            border-radius: 5px;
            background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(212,168,67,0.04) 6px, rgba(212,168,67,0.04) 12px);
            pointer-events: none;
        }
        .card-back-small {
            width: 55px;
            height: 80px;
        }
        .card-back-small::before { font-size: 0.9rem; }

        .table-felt {
            flex: 1;
            background: radial-gradient(ellipse at center, #1e5a2e, #174822, #0e3018);
            border: 4px solid #3a2a18;
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 20px;
            min-height: 200px;
            overflow: hidden;
            box-shadow:
                inset 0 0 40px rgba(0,0,0,0.6),
                inset 0 0 80px rgba(0,0,0,0.3),
                0 0 20px rgba(0,0,0,0.5),
                0 0 1px 1px rgba(212,168,67,0.15);
        }

        .tricks-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 170px;
            align-items: center;
        }
        .trick-pair {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            padding: 6px 10px;
            width: 100%;
            border-left: 3px solid rgba(212,168,67,0.3);
        }
        .trick-pair:nth-child(1) { border-left-color: rgba(212,168,67,0.6); }
        .trick-pair:nth-child(2) { border-left-color: rgba(192,192,192,0.6); }
        .trick-pair:nth-child(3) { border-left-color: rgba(139,28,48,0.6); }
        .trick-label {
            color: rgba(255,255,255,0.5);
            min-width: 28px;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
        .trick-card {
            width: 38px;
            height: 54px;
            font-size: 0.65rem;
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
            background: var(--cream);
        }
        .trick-card.winner-card { border-color: var(--gold); box-shadow: 0 0 6px rgba(212,168,67,0.5); }
        .trick-card.parda-card { border-color: #cc0; }
        .trick-vs {
            color: #d4a843;
            font-size: 0.6rem;
            font-style: italic;
        }
        .trick-result {
            font-size: 0.65rem;
            min-width: 50px;
            text-align: center;
        }
        .trick-result.player-win { color: var(--gold); }
        .trick-result.bot-win { color: var(--silver); }
        .trick-result.parda { color: #cc0; }

        .round-cards {
            display: flex;
            gap: 24px;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .round-card-slot {
            text-align: center;
        }
        .round-card-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .round-card {
            width: 85px;
            height: 120px;
            position: relative;
            animation: roundCardAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(145deg, #f5f0e0, #ebe3cc);
            border: 2px solid #c8b080;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .round-card-empty {
            width: 85px;
            height: 120px;
            border: 2px dashed rgba(212,168,67,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.15);
            font-size: 1.5rem;
        }
        .vs-text {
            color: #d4a843;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            font-style: italic;
        }

        .table-announcement {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            animation: announceFadeIn 0.3s ease-out;
            background: rgba(0,0,0,0.55);
            border-radius: 20px;
        }
        .table-announcement.fade-out {
            animation: announceFadeOut 0.5s ease-in forwards;
        }
        .announce-text {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
        }
        .announce-subtext {
            font-size: 0.85rem;
            margin-top: 4px;
            letter-spacing: 2px;
            opacity: 0.85;
        }
        .announce-you { color: #d4a843; }
        .announce-them { color: #c0c0c0; }
        .announce-parda { color: #d4a843; }
        .announce-points { color: #d4a843; }

        @keyframes announceFadeIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes announceFadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); }
        }

        /* Points badge */
        .points-badge {
            position: absolute;
            bottom: 10px;
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none;
            animation: pointsBadgeAnim 2s ease-out forwards;
            z-index: 11;
        }
        .points-badge.player-pts { left: 20%; color: #d4a843; }
        .points-badge.bot-pts { right: 20%; color: #c0c0c0; }

        @keyframes pointsBadgeAnim {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            30% { transform: translateY(-15px) scale(1.3); opacity: 1; }
            100% { transform: translateY(-40px) scale(1); opacity: 0; }
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 6px 0;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .player-row {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .partner-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 70px;
        }
        .partner-label {
            font-size: 0.7em;
            color: var(--gold);
            letter-spacing: 1px;
        }
        .partner-cards {
            display: flex;
            gap: 4px;
        }
        .partner-sena {
            font-size: 0.75em;
            color: var(--gold-light);
            background: rgba(212,168,67,0.1);
            border: 1px solid rgba(212,168,67,0.3);
            border-radius: 6px;
            padding: 2px 8px;
            margin-top: 2px;
            animation: bubblePop 3s ease forwards;
        }
        .ver-senas-btn {
            font-size: 0.6em;
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid rgba(212,168,67,0.4);
            background: rgba(212,168,67,0.1);
            color: var(--gold);
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 4px;
        }
        .ver-senas-btn:hover {
            background: rgba(212,168,67,0.25);
        }
        .ver-senas-btn.active {
            background: rgba(212,168,67,0.3);
            border-color: var(--gold);
        }
        .partner-mini-card {
            width: 32px;
            height: 44px;
            background: linear-gradient(145deg, #f5f0e0, #ebe3cc);
            border: 1.5px solid #c8b080;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .sena-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 4px 0;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .player-hand {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 8px 0;
            min-height: 120px;
            flex-shrink: 0;
        }

        /* Playing cards */
        .card {
            width: 90px;
            height: 130px;
            background: linear-gradient(145deg, #f5f0e0, #ebe3cc, #f5f0e0);
            border: 2px solid #c8b080;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 3px 12px rgba(0,0,0,0.4);
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 3px;
            border-radius: 10px 0 0 10px;
        }
        .card.playable:hover {
            transform: translateY(-20px) scale(1.08);
            box-shadow: 0 15px 40px rgba(212,168,67,0.5), 0 5px 15px rgba(0,0,0,0.4);
            border-color: #d4a843;
        }
        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .card.disabled:hover {
            transform: none;
            box-shadow: 0 3px 12px rgba(0,0,0,0.4);
            border-color: #c8b080;
        }

        .card-corner-tl {
            position: absolute;
            top: 4px; left: 6px;
            text-align: center;
            line-height: 1.1;
        }
        .card-corner-br {
            position: absolute;
            bottom: 4px; right: 6px;
            text-align: center;
            line-height: 1.1;
        }
        .card-value {
            font-size: 0.9em;
            font-weight: bold;
        }
        .card-suit-small {
            font-size: 0.65em;
        }
        .card-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
        }

        .card-table {
            width: 75px;
            height: 105px;
            font-size: 0.9em;
        }
        .card-table .card-center { font-size: 1.6em; }

        /* Card animations — ported from original */
        @keyframes cardDeal {
            0% { transform: translateY(120px) scale(0.6) rotateZ(10deg); opacity: 0; }
            60% { transform: translateY(-10px) scale(1.02) rotateZ(-1deg); opacity: 1; }
            100% { transform: translateY(0) scale(1) rotateZ(0deg); opacity: 1; }
        }
        .card.dealing {
            animation: cardDeal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes botCardDeal {
            0% { transform: translateY(-100px) scale(0.6); opacity: 0; }
            60% { transform: translateY(5px) scale(1.02); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .card-back.dealing {
            animation: botCardDeal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes roundCardAppear {
            0% { transform: scale(0.3) rotateY(90deg); opacity: 0; }
            50% { transform: scale(1.1) rotateY(10deg); opacity: 1; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }

        @keyframes cardFlip {
            0% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        /* Decision overlays */
        .decision-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .decision-overlay.active { display: flex; }

        .decision-box {
            background: rgba(20,10,5,0.95);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            max-width: 400px;
        }
        .decision-title {
            color: var(--gold);
            font-size: 1.4em;
            margin-bottom: 6px;
        }
        .decision-subtitle {
            color: var(--text-dim);
            margin-bottom: 16px;
            font-size: 0.9em;
        }
        .decision-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Speech bubbles */
        .speech-bubble {
            position: fixed;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 250;
            animation: bubbleAppear 0.4s ease-out, bubbleFade 0.5s ease-in 2s forwards;
            pointer-events: none;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            width: 0; height: 0;
            border: 10px solid transparent;
        }
        .speech-bubble.player-bubble {
            bottom: 260px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,10,5,0.95);
            border: 2px solid #d4a843;
            color: #d4a843;
            box-shadow: 0 0 25px rgba(212,168,67,0.3);
        }
        .speech-bubble.player-bubble::after {
            bottom: -20px; left: 50%;
            transform: translateX(-50%);
            border-top-color: #d4a843;
        }
        .speech-bubble.bot-bubble {
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,10,5,0.95);
            border: 2px solid #c0c0c0;
            color: #c0c0c0;
            box-shadow: 0 0 25px rgba(192,192,192,0.3);
        }
        .speech-bubble.bot-bubble::after {
            top: -20px; left: 50%;
            transform: translateX(-50%);
            border-bottom-color: #c0c0c0;
        }
        .speech-bubble.envido-bubble {
            border-color: #6ab87a; color: #6ab87a;
            box-shadow: 0 0 25px rgba(106,184,122,0.3);
        }
        .speech-bubble.envido-bubble.player-bubble::after { border-top-color: #6ab87a; }
        .speech-bubble.envido-bubble.bot-bubble::after { border-bottom-color: #6ab87a; }
        .speech-bubble.truco-bubble {
            border-color: #c45a6a; color: #c45a6a;
            box-shadow: 0 0 30px rgba(196,90,106,0.4);
            font-size: 1.6rem;
        }
        .speech-bubble.truco-bubble.player-bubble::after { border-top-color: #c45a6a; }
        .speech-bubble.truco-bubble.bot-bubble::after { border-bottom-color: #c45a6a; }
        .speech-bubble.quiero-bubble {
            border-color: #d4a843; color: #d4a843;
            box-shadow: 0 0 25px rgba(212,168,67,0.3);
        }
        .speech-bubble.quiero-bubble.player-bubble::after { border-top-color: #d4a843; }
        .speech-bubble.quiero-bubble.bot-bubble::after { border-bottom-color: #d4a843; }
        .speech-bubble.noquiero-bubble {
            border-color: #c45a6a; color: #c45a6a;
            box-shadow: 0 0 25px rgba(196,90,106,0.3);
        }
        .speech-bubble.noquiero-bubble.player-bubble::after { border-top-color: #c45a6a; }
        .speech-bubble.noquiero-bubble.bot-bubble::after { border-bottom-color: #c45a6a; }

        @keyframes bubbleAppear {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        @keyframes bubbleFade {
            0% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        /* Turn indicator */
        .turn-indicator {
            text-align: center;
            padding: 4px 0;
            font-size: 0.85em;
            flex-shrink: 0;
            min-height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 2px;
            font-family: Georgia, serif;
        }
        .turn-indicator.your-turn {
            color: var(--gold);
            animation: blink 1s ease-in-out infinite;
        }
        .turn-indicator.their-turn { color: var(--silver); }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat */
        .game-chat {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 280px;
            max-height: 300px;
            background: rgba(20,10,5,0.85);
            border: 1px solid rgba(212,168,67,0.2);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            z-index: 30;
        }
        .chat-header {
            padding: 8px 12px;
            color: var(--gold);
            font-size: 0.85em;
            border-bottom: 1px solid rgba(212,168,67,0.15);
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            max-height: 180px;
            overflow-y: auto;
            padding: 6px 10px;
            font-size: 0.8em;
        }
        .chat-msg { padding: 2px 0; }
        .chat-msg.system { color: var(--text-dim); font-style: italic; }
        .chat-msg.you { color: var(--gold); }
        .chat-msg.them { color: var(--silver); }
        .chat-input-row {
            display: flex;
            border-top: 1px solid rgba(212,168,67,0.15);
        }
        .chat-input-row input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: none;
            padding: 8px 10px;
            color: var(--text);
            font-family: Georgia, serif;
            font-size: 0.85em;
            outline: none;
        }
        .chat-input-row button {
            background: none;
            border: none;
            color: var(--gold);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 1em;
        }

        /* Game over overlay */
        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 60;
            align-items: center;
            justify-content: center;
        }
        .game-over-overlay.active { display: flex; }
        .game-over-box {
            background: rgba(20,10,5,0.95);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        .game-over-title {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .game-over-title.won { color: var(--gold); }
        .game-over-title.lost { color: var(--burgundy-light); }
        .game-over-scores {
            color: var(--text);
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        /* Envido reveal */
        .envido-reveal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 55;
            align-items: center;
            justify-content: center;
        }
        .envido-reveal.active { display: flex; }
        .envido-reveal-box {
            background: rgba(20,10,5,0.95);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }
        .envido-reveal-title {
            color: var(--gold);
            font-size: 1.4em;
            margin-bottom: 15px;
        }
        .envido-scores {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .envido-player-score {
            text-align: center;
        }
        .envido-player-score .name {
            font-size: 0.85em;
            color: var(--text-dim);
        }
        .envido-player-score .score-val {
            font-size: 2em;
            font-weight: bold;
        }
        .envido-player-score .score-val.winner { color: var(--gold); }
        .envido-player-score .score-val.loser { color: var(--text-dim); }
        .envido-result {
            font-size: 1.1em;
            margin-top: 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .auth-box, .modal { width: 95vw; padding: 20px; }
            .card { width: 65px; height: 95px; }
            .card-table { width: 50px; height: 72px; }
            .game-chat { width: 240px; }
            .lobby-header { flex-direction: column; text-align: center; }
        }

        /* Leaderboard */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .leaderboard-table th {
            color: var(--gold);
            text-align: left;
            padding: 6px 10px;
            border-bottom: 1px solid rgba(212,168,67,0.3);
            font-size: 0.85em;
        }
        .leaderboard-table td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(212,168,67,0.1);
            font-size: 0.9em;
        }

        /* Card suit colors on card element */
        .card.espadas { color: #1a5a8c; }
        .card.bastos { color: #1a6a30; }
        .card.copas { color: #a02040; }
        .card.oros { color: #b08018; }
        .card.espadas::before { background: #1a5a8c; }
        .card.bastos::before { background: #1a6a30; }
        .card.copas::before { background: #a02040; }
        .card.oros::before { background: #b08018; }

        /* Score bar */
        .score-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #3a2a18;
            position: relative;
            display: flex;
            flex-shrink: 0;
            border-radius: 3px;
            overflow: hidden;
            margin: 2px 0;
        }
        .score-bar-player {
            height: 100%;
            background: linear-gradient(90deg, #a67c2e, #d4a843, #f0d78c);
            transition: width 0.5s ease;
            box-shadow: 0 0 8px rgba(212, 168, 67, 0.5);
        }
        .score-bar-them {
            height: 100%;
            background: linear-gradient(90deg, #888, #c0c0c0, #e0e0e0);
            transition: width 0.5s ease;
            box-shadow: 0 0 8px rgba(192, 192, 192, 0.4);
            margin-left: auto;
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="crt-overlay"></div>
<div class="crt-vignette"></div>
<div class="particle p1" style="top:15%;left:10%"></div>
<div class="particle p2" style="top:25%;left:80%"></div>
<div class="particle p3" style="top:60%;left:20%"></div>
<div class="particle p4" style="top:45%;left:65%"></div>
<div class="particle p5" style="top:70%;left:45%"></div>
<div class="particle p6" style="top:10%;left:50%"></div>

<!-- ============ AUTH SCREEN ============ -->
<div id="authScreen" class="screen active">
    <div class="auth-logo">
        <h1>TRUCO Sh!</h1>
        <div class="subtitle">Energia para ser vos</div>
    </div>
    <div class="auth-box">
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="showAuthTab('login')">Entrar</div>
            <div class="auth-tab" onclick="showAuthTab('signup')">Registrarse</div>
        </div>
        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="btn btn-full">Entrar</button>
            <div id="loginError" class="auth-error"></div>
        </form>
        <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" required>
            </div>
            <div class="form-group">
                <label>Nombre de usuario</label>
                <input type="text" id="signupUsername" required minlength="2" maxlength="20">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="signupPassword" required minlength="4">
            </div>
            <button type="submit" class="btn btn-full">Crear cuenta</button>
            <div id="signupError" class="auth-error"></div>
        </form>
    </div>
</div>

<!-- ============ LOBBY SCREEN ============ -->
<div id="lobbyScreen" class="screen">
    <div class="lobby-header">
        <h2>TRUCO Sh!</h2>
        <div class="lobby-user-info">
            <span class="lobby-username" id="lobbyUsername"></span>
            <span class="lobby-stats" id="lobbyStats"></span>
            <span class="online-count" id="onlineCount"></span>
            <button class="btn btn-small btn-burgundy" onclick="handleLogout()">Salir</button>
        </div>
    </div>
    <div class="lobby-actions">
        <button class="btn" onclick="showCreateRoomModal()">Crear Sala</button>
        <button class="btn btn-silver" onclick="refreshRooms()">Actualizar</button>
    </div>
    <div class="rooms-list">
        <h3>Salas Disponibles</h3>
        <div id="roomsList"></div>
    </div>
</div>

<!-- Create Room Modal -->
<div id="createRoomModal" class="modal-overlay">
    <div class="modal">
        <h3>Crear Sala</h3>
        <div class="form-group">
            <label>Nombre de la sala</label>
            <input type="text" id="roomName" placeholder="Mi sala">
        </div>
        <div class="form-group">
            <label>Modo</label>
            <div class="radio-group">
                <div class="radio-option selected" onclick="selectMode(this, '1v1')">1 vs 1</div>
                <div class="radio-option" onclick="selectMode(this, '2v2')">2 vs 2</div>
            </div>
        </div>
        <div class="form-group">
            <label>Tiempo</label>
            <div class="radio-group">
                <div class="radio-option" onclick="selectTime(this, 5)">5 min</div>
                <div class="radio-option" onclick="selectTime(this, 10)">10 min</div>
                <div class="radio-option selected" onclick="selectTime(this, 0)">Sin limite</div>
            </div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-full" onclick="createRoom()">Crear</button>
            <button class="btn btn-full btn-burgundy" onclick="closeModal('createRoomModal')">Cancelar</button>
        </div>
    </div>
</div>

<!-- ============ ROOM SCREEN ============ -->
<div id="roomScreen" class="screen">
    <div class="room-header">
        <span class="room-title" id="roomTitle"></span>
        <span id="roomMode" style="color:var(--text-dim)"></span>
    </div>
    <div class="teams-display" id="teamsDisplay"></div>
    <div class="spectators-bar" id="spectatorsBar"></div>
    <div class="room-actions-bar" id="roomActionsBar">
        <button class="btn btn-ready" id="readyBtn" onclick="toggleReady()">Listo</button>
        <button class="btn btn-burgundy btn-small" onclick="leaveRoom()">Salir</button>
    </div>
</div>

<!-- ============ GAME SCREEN ============ -->
<div id="gameScreen" class="screen">
    <div class="game-header">
        <div class="game-score">
            <span class="score-you" id="yourScore">Vos: 0</span>
        </div>
        <div style="text-align:center">
            <div class="game-hand-info" id="handInfo">Mano 1</div>
            <div class="game-timer" id="gameTimer" style="display:none; color:var(--burgundy-light); font-size:0.95em; font-weight:bold;"></div>
        </div>
        <div class="game-score">
            <span class="score-them" id="theirScore">Ellos: 0</span>
        </div>
    </div>

    <div class="score-bar-container">
        <div class="score-bar-player" id="scoreBarPlayer" style="width:0%"></div>
        <div class="score-bar-them" id="scoreBarThem" style="width:0%"></div>
    </div>

    <div class="opponent-area" id="opponentArea"></div>

    <div class="table-felt" id="tableFelt">
        <div class="tricks-column" id="tricksColumn"></div>
        <div class="round-cards" id="roundCards"></div>
    </div>

    <div class="action-buttons" id="actionButtons"></div>

    <div class="player-row" id="playerRow">
        <div class="partner-area" id="partnerArea"></div>
        <div class="player-hand" id="playerHand"></div>
    </div>

    <div class="sena-bar" id="senaBar" style="display:none">
        <span style="color:var(--text-dim);font-size:0.8em;margin-right:6px">Seña:</span>
        <button class="btn btn-small" onclick="sendSena('tengo buena')">👍 Buena</button>
        <button class="btn btn-small" onclick="sendSena('tengo mala')">👎 Mala</button>
        <button class="btn btn-small btn-green" onclick="sendSena('envido')">🟢 Envido</button>
        <button class="btn btn-small btn-burgundy" onclick="sendSena('truco')">🔴 Truco</button>
        <button class="btn btn-small btn-silver" onclick="sendSena('matá')">⚔️ Matá</button>
        <button class="btn btn-small" onclick="sendSena('guardá')">🛡️ Guardá</button>
    </div>

    <div class="turn-indicator" id="turnIndicator"></div>

    <!-- Chat -->
    <div class="game-chat" id="gameChat">
        <div class="chat-header">Chat</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Escribir..." maxlength="200">
            <button onclick="sendChat()">►</button>
        </div>
    </div>
</div>

<!-- Decision overlays -->
<div id="envidoDecision" class="decision-overlay">
    <div class="decision-box">
        <div class="decision-title" id="envidoDecisionTitle">¡ENVIDO!</div>
        <div class="decision-subtitle" id="envidoDecisionSub"></div>
        <div class="decision-buttons" id="envidoDecisionBtns"></div>
    </div>
</div>

<div id="trucoDecision" class="decision-overlay">
    <div class="decision-box">
        <div class="decision-title" id="trucoDecisionTitle">¡TRUCO!</div>
        <div class="decision-subtitle" id="trucoDecisionSub"></div>
        <div class="decision-buttons" id="trucoDecisionBtns"></div>
    </div>
</div>

<!-- Envido reveal -->
<div id="envidoReveal" class="envido-reveal">
    <div class="envido-reveal-box" id="envidoRevealContent"></div>
</div>

<!-- Game over -->
<div id="gameOverOverlay" class="game-over-overlay">
    <div class="game-over-box">
        <div class="game-over-title" id="gameOverTitle"></div>
        <div class="game-over-scores" id="gameOverScores"></div>
        <button class="btn" onclick="backToLobby()">Volver al Lobby</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================================
// TRUCO Sh! MULTIPLAYER CLIENT
// ============================================================================

const API_BASE = '';
const SUIT_SYMBOLS = {
    espadas: '🗡️', bastos: '🪵', copas: '🍷', oros: '🟡'
};
const SUIT_COLORS = {
    espadas: '#1a5a8c', bastos: '#1a6a30', copas: '#a02040', oros: '#b08018'
};

let token = localStorage.getItem('shtruco_token');
let currentUser = null;
let socket = null;
let currentRoom = null;
let gameData = null; // {players, yourHand, scores, currentTurn, phase, ...}
let myReady = false;
let selectedMode = '1v1';
let selectedTime = 0; // 0, 5, or 10 minutes

// ============================================================================
// SCREENS
// ============================================================================

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ============================================================================
// AUTH
// ============================================================================

function showAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
    } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('signupForm').classList.add('active');
    }
}

async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    document.getElementById('loginError').textContent = '';

    try {
        const res = await fetch(API_BASE + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('shtruco_token', token);
        connectSocket();
        enterLobby();
    } catch (err) {
        document.getElementById('loginError').textContent = err.message;
    }
}

async function handleSignup(e) {
    e.preventDefault();
    const email = document.getElementById('signupEmail').value;
    const username = document.getElementById('signupUsername').value;
    const password = document.getElementById('signupPassword').value;
    document.getElementById('signupError').textContent = '';

    try {
        const res = await fetch(API_BASE + '/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('shtruco_token', token);
        connectSocket();
        enterLobby();
    } catch (err) {
        document.getElementById('signupError').textContent = err.message;
    }
}

function handleLogout() {
    localStorage.removeItem('shtruco_token');
    if (socket) socket.disconnect();
    token = null;
    currentUser = null;
    showScreen('authScreen');
}

function enterLobby() {
    document.getElementById('lobbyUsername').textContent = currentUser.username;
    document.getElementById('lobbyStats').textContent = `W:${currentUser.wins} L:${currentUser.losses} ELO:${currentUser.elo}`;
    showScreen('lobbyScreen');
    refreshRooms();
}

// ============================================================================
// SOCKET
// ============================================================================

function connectSocket() {
    socket = io({ auth: { token } });

    socket.on('connect_error', (err) => {
        console.error('Socket auth error:', err.message);
        handleLogout();
    });

    socket.on('online_count', (count) => {
        const el = document.getElementById('onlineCount');
        if (el) el.textContent = `${count} online`;
    });

    socket.on('rooms_list', (rooms) => {
        renderRoomsList(rooms);
    });

    socket.on('room_joined', (room) => {
        currentRoom = room;
        showRoomScreen(room);
    });

    socket.on('room_updated', (room) => {
        currentRoom = room;
        if (document.getElementById('roomScreen').classList.contains('active')) {
            showRoomScreen(room);
        }
    });

    socket.on('spectating', (room) => {
        currentRoom = room;
        showRoomScreen(room);
    });

    socket.on('player_left', ({ username }) => {
        addChatMsg(`${username} se fue`, 'system');
    });

    socket.on('error_msg', (msg) => {
        console.warn('Server error:', msg);
    });

    // ---- GAME EVENTS ----

    socket.on('game_start', (data) => {
        startMultiplayerGame(data);
    });

    socket.on('new_hand', (data) => {
        handleNewHand(data);
    });

    socket.on('hand_update', (data) => {
        if (gameData) {
            gameData.yourHand = data.yourHand;
            gameData.currentTurn = data.currentTurn;
            gameData.phase = data.phase;
            if (data.partnerHands) gameData.partnerHands = data.partnerHands;
            renderGame();
        }
    });

    socket.on('game_event', (event) => {
        handleGameEvent(event);
    });

    socket.on('game_over', (data) => {
        showGameOver(data);
    });

    socket.on('chat_message', (msg) => {
        const isYou = msg.username === currentUser.username;
        addChatMsg(`${msg.username}: ${msg.message}`, isYou ? 'you' : 'them');
    });

    socket.on('sena_received', (data) => {
        addChatMsg(`[Seña de ${data.from}: ${data.sena}]`, 'system');
        // Show seña on partner area
        if (gameData) {
            gameData.lastPartnerSena = data.sena;
            renderGame();
            // Clear after 4 seconds
            setTimeout(() => {
                if (gameData) {
                    gameData.lastPartnerSena = null;
                    renderGame();
                }
            }, 4000);
        }
    });

    socket.on('timer_update', (data) => {
        const timerEl = document.getElementById('gameTimer');
        if (timerEl && data.remaining > 0) {
            const mins = Math.floor(data.remaining / 60);
            const secs = data.remaining % 60;
            timerEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
            timerEl.style.display = '';
            // Flash red when < 60 seconds
            if (data.remaining < 60) {
                timerEl.style.color = data.remaining % 2 === 0 ? 'var(--burgundy-light)' : 'var(--gold)';
            } else {
                timerEl.style.color = 'var(--burgundy-light)';
            }
        }
    });

    socket.on('opponent_disconnected', (data) => {
        showTableAnnouncement('Oponente desconectado', `${data.winner} gana`, 'announce-you');
        setTimeout(() => backToLobby(), 3000);
    });
}

// ============================================================================
// LOBBY
// ============================================================================

function refreshRooms() {
    if (socket) socket.emit('get_rooms');
}

function renderRoomsList(rooms) {
    const container = document.getElementById('roomsList');
    if (!rooms || rooms.length === 0) {
        container.innerHTML = '<div class="no-rooms">No hay salas. ¡Creá una!</div>';
        return;
    }

    container.innerHTML = rooms.map(r => {
        const timeLabel = r.timeLimit > 0 ? `${r.timeLimit} min` : 'sin limite';
        const botBadge = r.isBot ? '<span style="color:var(--burgundy-light);font-size:0.8em;margin-left:6px">🤖 BOT</span>' : '';
        const borderStyle = r.isBot ? 'border-color: rgba(139,28,48,0.5)' : '';

        const canJoin = r.status === 'waiting' && (r.isBot ? !r.players.some(p => !p.isBot) : r.players.length < r.maxPlayers);
        const canSpectate = r.status === 'playing';
        const clickAction = canJoin ? `joinRoom('${r.id}')` : (canSpectate ? `spectateRoom('${r.id}')` : '');
        const actionLabel = canJoin ? (r.isBot ? '¡Jugar!' : 'Unirse') : (canSpectate ? 'Ver partida' : 'Llena');
        const actionColor = canJoin ? (r.isBot ? 'var(--burgundy-light)' : 'var(--gold)') : (canSpectate ? 'var(--silver)' : 'var(--text-dim)');

        return `
        <div class="room-card" style="${borderStyle}" ${clickAction ? `onclick="${clickAction}"` : ''}>
            <div class="room-info">
                <div class="room-name">${escapeHtml(r.name)}${botBadge}</div>
                <div class="room-meta">
                    ${r.mode.toUpperCase()} · ${r.players.filter(p => !p.isBot).length}/${r.maxPlayers - (r.isBot ? r.players.filter(p => p.isBot).length : 0)} humanos
                    · ${timeLabel}
                    ${r.spectators > 0 ? ` · ${r.spectators} espectadores` : ''}
                    ${!r.isBot ? ` · Host: ${escapeHtml(r.host)}` : ''}
                    ${r.status === 'playing' ? ' · <span style="color:#5a5">Jugando</span>' : ''}
                </div>
            </div>
            <div style="color:${actionColor};font-size:0.9em;font-weight:bold;letter-spacing:1px;white-space:nowrap">${actionLabel} ›</div>
        </div>`;
    }).join('');
}

function showCreateRoomModal() {
    document.getElementById('createRoomModal').classList.add('active');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}

function selectMode(el, mode) {
    el.parentElement.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedMode = mode;
}

function selectTime(el, time) {
    el.parentElement.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedTime = time;
}

function createRoom() {
    const name = document.getElementById('roomName').value || undefined;
    socket.emit('create_room', { name, mode: selectedMode, timeLimit: selectedTime });
    closeModal('createRoomModal');
}

function joinRoom(roomId) {
    socket.emit('join_room', { roomId });
}

function spectateRoom(roomId) {
    socket.emit('spectate_room', { roomId });
}

function leaveRoom() {
    socket.emit('leave_room');
    currentRoom = null;
    myReady = false;
    showScreen('lobbyScreen');
    refreshRooms();
}

// ============================================================================
// ROOM SCREEN
// ============================================================================

function showRoomScreen(room) {
    showScreen('roomScreen');
    document.getElementById('roomTitle').textContent = room.name;
    document.getElementById('roomMode').textContent = room.mode.toUpperCase();

    const teamsDiv = document.getElementById('teamsDisplay');
    const maxPerTeam = room.mode === '2v2' ? 2 : 1;

    let html = '';
    for (let team = 0; team < 2; team++) {
        const teamPlayers = room.players.filter(p => p.team === team);
        const label = team === 0 ? 'Equipo Oro' : 'Equipo Plata';
        html += `<div class="team-box team-${team}">
            <div class="team-label">${label}</div>`;
        for (let i = 0; i < maxPerTeam; i++) {
            if (teamPlayers[i]) {
                const p = teamPlayers[i];
                const youClass = p.isYou ? ' is-you' : '';
                const readyClass = p.ready ? ' ready' : '';
                html += `<div class="team-player${youClass}${readyClass}">
                    <span class="ready-dot"></span>${escapeHtml(p.username)}${p.isYou ? ' (vos)' : ''}
                </div>`;
            } else {
                html += `<div class="empty-slot">Esperando...</div>`;
            }
        }
        html += `</div>`;
    }
    teamsDiv.innerHTML = html;

    // Spectators
    const specBar = document.getElementById('spectatorsBar');
    if (room.spectators.length > 0) {
        specBar.textContent = 'Espectadores: ' + room.spectators.map(s => s.username).join(', ');
    } else {
        specBar.textContent = '';
    }

    // Ready button state
    const readyBtn = document.getElementById('readyBtn');
    const isPlayer = room.players.some(p => p.isYou);
    if (isPlayer) {
        readyBtn.style.display = '';
        readyBtn.textContent = myReady ? '✓ Listo' : 'Listo';
        readyBtn.classList.toggle('is-ready', myReady);
    } else {
        readyBtn.style.display = 'none';
    }
}

function toggleReady() {
    myReady = !myReady;
    socket.emit('set_ready', myReady);
}

// ============================================================================
// GAME
// ============================================================================

function startMultiplayerGame(data) {
    gameData = {
        mode: data.mode,
        players: data.players,
        yourHand: data.yourHand || [],
        yourTeam: data.yourTeam,
        scores: data.scores,
        currentTurn: data.currentTurn,
        mano: data.mano,
        manoUsername: data.manoUsername,
        handNumber: data.handNumber,
        spectating: data.spectating || false,
        tricks: [],
        currentRoundCards: {},
        phase: 'playing',
        timeLimit: data.timeLimit || 0,
        firstTrickDone: false,
        animateCards: true,
        partnerHands: data.partnerHands || {},
        showPartnerCards: false,
    };

    showScreen('gameScreen');
    document.getElementById('chatMessages').innerHTML = '';
    const timerEl = document.getElementById('gameTimer');
    if (timerEl) timerEl.style.display = data.timeLimit > 0 ? '' : 'none';
    addChatMsg(`Comienza la partida. Juega a 30 puntos.${data.timeLimit > 0 ? ` Tiempo: ${data.timeLimit} min.` : ''}`, 'system');
    addChatMsg(`${data.manoUsername} es mano`, 'system');
    renderGame();
}

function handleNewHand(data) {
    if (!gameData) return;
    gameData.yourHand = data.yourHand || [];
    gameData.handNumber = data.handNumber;
    gameData.mano = data.mano;
    gameData.manoUsername = data.manoUsername;
    gameData.scores = data.scores;
    gameData.currentTurn = data.currentTurn;
    gameData.tricks = [];
    gameData.currentRoundCards = {};
    gameData.phase = 'playing';
    gameData.firstTrickDone = false;
    gameData.animateCards = true;
    gameData.partnerHands = data.partnerHands || {};
    gameData.showPartnerCards = false;
    // Reset all player card counts to 3
    for (const p of gameData.players) {
        p.cardCount = 3;
    }

    addChatMsg(`--- Mano ${data.handNumber} ---`, 'system');
    addChatMsg(`${data.manoUsername} es mano`, 'system');
    renderGame();
}

function handleGameEvent(event) {
    if (!gameData) return;

    switch (event.type) {
        case 'card_played':
            gameData.currentRoundCards[event.playerId] = event.card;
            if (event.nextTurn) gameData.currentTurn = event.nextTurn;
            // Decrement opponent card count
            if (event.playerId !== currentUser.id) {
                const player = gameData.players.find(p => p.id === event.playerId);
                if (player && player.cardCount > 0) player.cardCount--;
            }
            addChatMsg(`${event.username} juega ${event.card.value} de ${event.card.suit}`,
                event.playerId === currentUser.id ? 'you' : 'them');
            renderGame();
            break;

        case 'round_resolved':
            if (event.playEvent) {
                gameData.currentRoundCards[event.playEvent.playerId] = event.playEvent.card;
                // Decrement card count for the player who triggered the round resolution
                if (event.playEvent.playerId !== currentUser.id) {
                    const pl = gameData.players.find(p => p.id === event.playEvent.playerId);
                    if (pl && pl.cardCount > 0) pl.cardCount--;
                }
            }
            // Store all cards for this round
            if (event.cards) {
                Object.assign(gameData.currentRoundCards, event.cards);
            }
            renderGame(); // Show both cards on table

            const trickWinner = event.trickWinner;
            const myTeam = gameData.yourTeam;
            setTimeout(() => {
                // Save trick
                gameData.tricks.push({
                    cards: event.cards,
                    winner: trickWinner
                });
                gameData.firstTrickDone = true;

                if (trickWinner === myTeam) {
                    showTableAnnouncement('¡GANASTE!', `${event.roundLabel} ronda`, 'announce-you');
                } else if (trickWinner === 2) {
                    showTableAnnouncement('PARDA', `${event.roundLabel} ronda`, 'announce-parda');
                } else {
                    showTableAnnouncement('PERDISTE', `${event.roundLabel} ronda`, 'announce-them');
                }

                gameData.currentRoundCards = {};
                if (event.nextTurn) gameData.currentTurn = event.nextTurn;

                if (event.handResult) {
                    handleGameEvent(event.handResult);
                } else {
                    renderGame();
                }
            }, 1200);
            break;

        case 'hand_finished':
            gameData.scores = event.scores;
            const wonHand = event.winnerTeam === gameData.yourTeam;
            setTimeout(() => {
                if (wonHand) {
                    showTableAnnouncement('¡MANO TUYA!', `+${event.points} punto${event.points > 1 ? 's' : ''}`, 'announce-you');
                    showPointsBadge(event.points, true);
                } else {
                    showTableAnnouncement('MANO PERDIDA', `+${event.points} punto${event.points > 1 ? 's' : ''}`, 'announce-them');
                    showPointsBadge(event.points, false);
                }
                renderGame();
            }, 500);
            break;

        case 'envido_called':
            if (event.responderId === currentUser.id) {
                showEnvidoDecision(event);
            }
            showSpeechBubble(`¡${event.levelName}!`, event.username, 'envido-bubble');
            addChatMsg(`${event.username} canta ${event.levelName}`, 'system');
            break;

        case 'envido_resolved':
            closeAllDecisions();
            if (event.accepted) {
                showSpeechBubble('¡Quiero!', event.responderUsername || '', 'quiero-bubble');
                showEnvidoReveal(event);
                gameData.scores = event.gameScores;
            } else {
                showSpeechBubble('No quiero', event.responderUsername || '', 'noquiero-bubble');
                addChatMsg(`No quiero. +${event.rejectPoints} pts`, 'system');
                gameData.scores = event.gameScores;
                if (event.rejectPoints) showPointsBadge(event.rejectPoints, event.winnerTeam === gameData.yourTeam);
            }
            if (event.gameOver) {
                // Will receive game_over event
            }
            renderGame();
            break;

        case 'truco_called':
            if (event.responderId === currentUser.id) {
                showTrucoDecision(event);
            }
            showSpeechBubble(`¡${event.levelName}!`, event.username, 'truco-bubble');
            addChatMsg(`${event.username} canta ${event.levelName}`, 'system');
            break;

        case 'truco_resolved':
            closeAllDecisions();
            if (event.accepted) {
                showSpeechBubble('¡Quiero!', event.responderUsername || '', 'quiero-bubble');
                addChatMsg(`¡Quiero! Puntos en juego: ${event.pointsAtStake}`, 'system');
                if (event.nextTurn) gameData.currentTurn = event.nextTurn;
                gameData.phase = 'playing';
            } else {
                showSpeechBubble('No quiero', event.responderUsername || '', 'noquiero-bubble');
                addChatMsg(`No quiero. +${event.points} pts`, 'system');
                if (event.points) showPointsBadge(event.points, event.winnerTeam === gameData.yourTeam);
                gameData.scores = event.gameScores;
            }
            renderGame();
            break;

        case 'mazo':
            addChatMsg(`${event.username} se fue al mazo`, 'system');
            gameData.scores = event.gameScores;
            showTableAnnouncement(
                event.winnerTeam === gameData.yourTeam ? '¡AL MAZO!' : 'Se fueron al mazo',
                `+${event.points} pts`,
                event.winnerTeam === gameData.yourTeam ? 'announce-you' : 'announce-them'
            );
            renderGame();
            break;

        case 'opponent_disconnected':
            showTableAnnouncement('Oponente desconectado', `${event.winner} gana`, 'announce-you');
            break;

        case 'time_up':
            const wonTime = event.winnerTeam === gameData.yourTeam;
            showTableAnnouncement(
                '⏱ ¡TIEMPO!',
                wonTime ? '¡Ganaste por puntos!' : 'Perdiste por puntos',
                wonTime ? 'announce-you' : 'announce-them'
            );
            break;
    }
}

// ============================================================================
// RENDER GAME
// ============================================================================

function renderGame() {
    if (!gameData) return;

    const myTeam = gameData.yourTeam;
    const myScore = gameData.scores[myTeam];
    const theirScore = gameData.scores[1 - myTeam];

    // Scores
    document.getElementById('yourScore').textContent = `Vos: ${myScore}`;
    document.getElementById('theirScore').textContent = `Ellos: ${theirScore}`;
    // Show mano (who deals / goes first)
    const manoPlayer = gameData.players.find(p => p.id === gameData.mano);
    const manoLabel = manoPlayer ? (manoPlayer.id === currentUser.id ? 'Vos sos mano' : `Mano: ${manoPlayer.username}`) : '';
    document.getElementById('handInfo').innerHTML = `Mano ${gameData.handNumber}<br><span style="font-size:0.75em;color:var(--gold)">${manoLabel}</span>`;

    // Score bars
    const barPlayer = document.getElementById('scoreBarPlayer');
    const barThem = document.getElementById('scoreBarThem');
    if (barPlayer) barPlayer.style.width = `${(myScore / 30) * 100}%`;
    if (barThem) barThem.style.width = `${(theirScore / 30) * 100}%`;

    // Opponents at top, partner beside player hand
    const oppArea = document.getElementById('opponentArea');
    const opponents = gameData.players.filter(p => p.team !== myTeam);
    const partners = gameData.players.filter(p => p.team === myTeam && p.id !== currentUser.id);
    const dealAnim = gameData.animateCards;

    oppArea.innerHTML = opponents.map(opp => {
        let backs = '';
        for (let i = 0; i < opp.cardCount; i++) {
            const animClass = dealAnim ? ' dealing' : '';
            const animStyle = dealAnim ? ` style="animation-delay:${i * 0.15}s"` : '';
            backs += `<div class="card-back${animClass}"${animStyle}></div>`;
        }
        const isTurn = opp.id === gameData.currentTurn;
        return `<div style="text-align:center">
            <div style="color:var(--silver);font-size:0.8em;margin-bottom:4px;font-weight:${isTurn ? 'bold' : 'normal'}">${escapeHtml(opp.username)}${isTurn ? ' ◀' : ''}</div>
            <div class="opp-hand-fan">${backs}</div>
        </div>`;
    }).join('');

    // Partner area (beside your hand) — only in 2v2
    const partnerArea = document.getElementById('partnerArea');
    const senaBar = document.getElementById('senaBar');
    if (partners.length > 0) {
        const partner = partners[0];
        const isTurn = partner.id === gameData.currentTurn;
        const senaHtml = gameData.lastPartnerSena ? `<div class="partner-sena">${escapeHtml(gameData.lastPartnerSena)}</div>` : '';

        // Show actual cards or backs depending on toggle
        let cardsHtml = '';
        const partnerCards = gameData.partnerHands && gameData.partnerHands[partner.id];
        if (gameData.showPartnerCards && partnerCards && partnerCards.length > 0) {
            cardsHtml = partnerCards.map((card, i) => {
                const animClass = dealAnim ? ' dealing' : '';
                const animStyle = dealAnim ? ` style="animation-delay:${i * 0.15}s"` : '';
                return renderPartnerCardHTML(card, animClass, animStyle);
            }).join('');
        } else {
            for (let i = 0; i < partner.cardCount; i++) {
                const animClass = dealAnim ? ' dealing' : '';
                const animStyle = dealAnim ? ` style="animation-delay:${i * 0.15}s"` : '';
                cardsHtml += `<div class="card-back card-back-small${animClass}"${animStyle}></div>`;
            }
        }

        const toggleLabel = gameData.showPartnerCards ? 'Ocultar' : 'Ver señas';
        const toggleBtn = partnerCards && partnerCards.length > 0
            ? `<button class="ver-senas-btn${gameData.showPartnerCards ? ' active' : ''}" onclick="togglePartnerCards()">${toggleLabel}</button>`
            : '';

        partnerArea.innerHTML = `
            <div class="partner-label">${escapeHtml(partner.username)}${isTurn ? ' ◀' : ''} ${toggleBtn}</div>
            <div class="partner-cards">${cardsHtml}</div>
            ${senaHtml}
        `;
        partnerArea.style.display = '';
        senaBar.style.display = '';
    } else {
        partnerArea.innerHTML = '';
        partnerArea.style.display = 'none';
        if (senaBar) senaBar.style.display = 'none';
    }

    // Tricks column — render actual trick card pairs with suit colors
    const tricksCol = document.getElementById('tricksColumn');
    const roundLabels = ['1ra', '2da', '3ra'];
    tricksCol.innerHTML = gameData.tricks.map((t, i) => {
        const isMyWin = t.winner === myTeam;
        const isParda = t.winner === 2;
        const isTheirWin = !isMyWin && !isParda;

        // Get cards for this trick — show all cards per team with player names
        let myTeamCardHtml = '';
        let oppTeamCardHtml = '';
        if (t.cards) {
            // All cards from my team
            for (const p of gameData.players.filter(pl => pl.team === myTeam)) {
                const card = t.cards[p.id];
                if (card) {
                    myTeamCardHtml += renderTrickCardHTML(card, isMyWin ? 'winner-card' : (isParda ? 'parda-card' : ''));
                }
            }
            // All cards from opponent team
            for (const p of gameData.players.filter(pl => pl.team !== myTeam)) {
                const card = t.cards[p.id];
                if (card) {
                    oppTeamCardHtml += renderTrickCardHTML(card, isTheirWin ? 'winner-card' : (isParda ? 'parda-card' : ''));
                }
            }
        }

        const resultClass = isParda ? 'parda' : (isMyWin ? 'player-win' : 'bot-win');
        const resultText = isParda ? 'Parda' : (isMyWin ? 'Ganaste' : 'Perdiste');

        return `<div class="trick-pair">
            <span class="trick-label">${roundLabels[i]}</span>
            <div class="trick-cards-row" style="display:flex;gap:3px;align-items:center">
                ${myTeamCardHtml}
                <div class="trick-vs">vs</div>
                ${oppTeamCardHtml}
            </div>
            <span class="trick-result ${resultClass}">${resultText}</span>
        </div>`;
    }).join('');

    // Current round cards on table — proper round-card elements
    const roundCards = document.getElementById('roundCards');
    const anyCardPlayed = Object.keys(gameData.currentRoundCards).length > 0;

    let rcHtml = '';
    if (anyCardPlayed) {
        const roundIdx = gameData.tricks.length;
        const roundLabel = roundLabels[roundIdx] || '';
        if (roundLabel) {
            rcHtml += `<div style="font-size:0.7rem;color:#666;letter-spacing:1px;margin-right:10px">${roundLabel}</div>`;
        }
    }

    // My team's cards
    const myTeamPlayers = gameData.players.filter(p => p.team === myTeam);
    const oppTeamPlayers = gameData.players.filter(p => p.team !== myTeam);

    for (const p of myTeamPlayers) {
        const card = gameData.currentRoundCards[p.id];
        if (card) {
            rcHtml += `<div class="round-card-slot">
                <div class="round-card-label">${escapeHtml(p.username)}</div>
                ${renderRoundCardHTML(card)}
            </div>`;
        } else if (anyCardPlayed) {
            rcHtml += `<div class="round-card-slot">
                <div class="round-card-label">${escapeHtml(p.username)}</div>
                <div class="round-card-empty">?</div>
            </div>`;
        }
    }

    if (anyCardPlayed) {
        rcHtml += `<div class="vs-text">vs</div>`;
    }

    // Opponent team's cards
    for (const p of oppTeamPlayers) {
        const card = gameData.currentRoundCards[p.id];
        if (card) {
            rcHtml += `<div class="round-card-slot">
                <div class="round-card-label">${escapeHtml(p.username)}</div>
                ${renderRoundCardHTML(card)}
            </div>`;
        } else if (anyCardPlayed) {
            rcHtml += `<div class="round-card-slot">
                <div class="round-card-label">${escapeHtml(p.username)}</div>
                <div class="round-card-empty">?</div>
            </div>`;
        }
    }
    roundCards.innerHTML = rcHtml;

    // Player hand — only animate on first deal of each hand
    const handDiv = document.getElementById('playerHand');
    if (gameData.spectating) {
        handDiv.innerHTML = '<div style="color:var(--text-dim);font-style:italic">Modo espectador</div>';
    } else {
        const isMyTurn = gameData.currentTurn === currentUser.id && gameData.phase === 'playing';
        handDiv.innerHTML = (gameData.yourHand || []).map((card, i) => {
            const anim = dealAnim ? ' dealing' : '';
            const playable = isMyTurn ? ' playable' : ' disabled';
            const onclick = isMyTurn ? ` onclick="doPlayCard(${i})"` : '';
            return renderCardHTML(card, `${anim}${playable}`, onclick, i);
        }).join('');
    }

    // Turn off deal animation after first render
    if (gameData.animateCards) gameData.animateCards = false;

    // Action buttons
    renderActionButtons();

    // Turn indicator
    const turnDiv = document.getElementById('turnIndicator');
    if (gameData.currentTurn === currentUser.id) {
        turnDiv.textContent = 'Tu turno';
        turnDiv.className = 'turn-indicator your-turn';
    } else {
        const turnPlayer = gameData.players.find(p => p.id === gameData.currentTurn);
        turnDiv.textContent = turnPlayer ? `Turno de ${turnPlayer.username}` : '';
        turnDiv.className = 'turn-indicator their-turn';
    }
}

function renderActionButtons() {
    const btns = document.getElementById('actionButtons');
    if (gameData.spectating) {
        btns.innerHTML = '';
        return;
    }

    const isMyTurn = gameData.currentTurn === currentUser.id;
    let html = '';

    // Envido (first trick only)
    if (!gameData.firstTrickDone && gameData.tricks.length === 0 && gameData.phase === 'playing') {
        html += `<button class="btn btn-small" onclick="doCallEnvido('envido')">ENVIDO</button>`;
        html += `<button class="btn btn-small btn-silver" onclick="doCallEnvido('real_envido')">REAL ENVIDO</button>`;
        html += `<button class="btn btn-small btn-burgundy" onclick="doCallEnvido('falta_envido')">FALTA ENVIDO</button>`;
    }

    // Truco
