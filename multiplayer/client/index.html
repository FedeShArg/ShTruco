// FÓSFORO (MATCHSTICK) SCORING COUNTER
// ============================================================================

/**
 * Draw a single matchstick box SVG with 0-5 marks.
 * Marks: 1=bottom, 2=right, 3=top, 4=left, 5=diagonal
 * Each line is a "matchstick" forming a square + diagonal.
 */
function fosforoBoxSVG(marks, color) {
    const m = 3;       // margin
    const s = 27;      // size (inside 30x30)
    const w = 2.5;     // stroke width
    const dimColor = color === '#d4a843' ? 'rgba(212,168,67,0.15)' : 'rgba(192,192,192,0.15)';

    // Line definitions: [x1, y1, x2, y2]
    const lines = [
        [m, m, m, s],       // 1: izquierda (left)
        [m, m, s, m],       // 2: arriba (top)
        [s, m, s, s],       // 3: derecha (right)
        [m, s, s, s],       // 4: abajo (bottom)
        [m, s, s, m],       // 5: diagonal
    ];

    let svg = `<svg viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">`;
    for (let i = 0; i < 5; i++) {
        const [x1, y1, x2, y2] = lines[i];
        const active = i < marks;
        svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${active ? color : dimColor}" stroke-width="${w}" stroke-linecap="round"/>`;
    }
    svg += `</svg>`;
    return svg;
}

/**
 * Render the full fósforo counter for one team.
 * score: 0-30
 * Returns HTML string.
 */
function renderFosforoTeam(score, label, cssClass) {
    const inBuenas = score >= 15;
    const phaseScore = inBuenas ? score - 15 : score;
    const phaseName = inBuenas ? 'Buenas' : 'Malas';
    const phaseClass = inBuenas ? 'buenas' : 'malas';
    const color = cssClass === 'vos' ? '#d4a843' : '#c0c0c0';

    // Number of full boxes (each = 5 points)
    const fullBoxes = Math.floor(phaseScore / 5);
    // Remaining marks in partial box
    const remainder = phaseScore % 5;

    let boxesHtml = '<div class="fosforo-boxes">';
    for (let i = 0; i < fullBoxes; i++) {
        boxesHtml += `<div class="fosforo-box">${fosforoBoxSVG(5, color)}</div>`;
    }
    // Partial box (if remainder > 0, or if no boxes at all show an empty one)
    if (remainder > 0) {
        boxesHtml += `<div class="fosforo-box">${fosforoBoxSVG(remainder, color)}</div>`;
    } else if (fullBoxes === 0) {
        boxesHtml += `<div class="fosforo-box">${fosforoBoxSVG(0, color)}</div>`;
    }
    boxesHtml += '</div>';

    return `
        <div class="fosforo-label ${cssClass}">${label}</div>
        <div class="fosforo-phase ${phaseClass}">${phaseScore} ${phaseName}</div>
        ${boxesHtml}
        <div class="fosforo-score-num ${cssClass}">${score}/30</div>
    `;
}

function updateFosforoCounter(myScore, theirScore) {
    const vosEl = document.getElementById('fosforoVos');
    const ellosEl = document.getElementById('fosforoEllos');
    if (vosEl) vosEl.innerHTML = renderFosforoTeam(myScore, 'Vos', 'vos');
    if (ellosEl) ellosEl.innerHTML = renderFosforoTeam(theirScore, 'Ellos', 'ellos');
}

// RENDER GAME
// ============================================================================

function renderGame() {
    if (!gameData) return;

    const myTeam = gameData.yourTeam;
    const myScore = gameData.scores[myTeam];
    const theirScore = gameData.scores[1 - myTeam];

    // Scores
    document.getElementById('yourScore').textContent = `Vos: ${myScore}`;
    document.getElementById('theirScore').textContent = `Ellos: ${theirScore}`;
    // Show mano (who deals / goes first)
    const manoPlayer = gameData.players.find(p => p.id === gameData.mano);
    const manoLabel = manoPlayer ? (manoPlayer.id === currentUser.id ? 'Vos sos mano' : `Mano: ${manoPlayer.username}`) : '';
    document.getElementById('handInfo').innerHTML = `Mano ${gameData.handNumber}<br><span style="font-size:0.75em;color:var(--gold)">${manoLabel}</span>`;

    // Score bars
    const barPlayer = document.getElementById('scoreBarPlayer');
    const barThem = document.getElementById('scoreBarThem');
    if (barPlayer) barPlayer.style.width = `${(myScore / 30) * 100}%`;
    if (barThem) barThem.style.width = `${(theirScore / 30) * 100}%`;

    // Fósforo counter
    updateFosforoCounter(myScore, theirScore);

    // Opponents at top, partner beside player hand
    const oppArea = document.getElementById('opponentArea');
    const opponents = gameData.players.filter(p => p.team !== myTeam);
    const partners = gameData.players.filter(p => p.team === myTeam && p.id !== currentUser.id);
    const dealAnim = gameData.animateCards;

    oppArea.innerHTML = opponents.map(opp => {
        let backs = '';
        for (let i = 0; i < opp.cardCount; i++) {
            const animClass = dealAnim ? ' dealing' : '';
            const animStyle = dealAnim ? ` style="animation-delay:${i * 0.15}s"` : '';
            backs += `<div class="card-back${animClass}"${animStyle}></div>`;
        }
        const isTurn = opp.id === gameData.currentTurn;
        return `<div style="text-align:center">
            <div style="color:var(--silver);font-size:0.8em;margin-bottom:4px;font-weight:${isTurn ? 'bold' : 'normal'}">${escapeHtml(opp.username)}${isTurn ? ' ◀' : ''}</div>
            <div class="opp-hand-fan">${backs}</div>
        </div>`;
    }).join('');

    // Partner area (beside your hand) — only in 2v2
    const partnerArea = document.getElementById('partnerArea');
    const senaBar = document.getElementById('senaBar');
    if (partners.length > 0) {
        const partner = partners[0];
        const isTurn = partner.id === gameData.currentTurn;
        const senaHtml = gameData.lastPartnerSena ? `<div class="partner-sena">${escapeHtml(gameData.lastPartnerSena)}</div>` : '';

        // Show actual cards or backs depending on toggle
        let cardsHtml = '';
        const partnerCards = gameData.partnerHands && gameData.partnerHands[partner.id];
        if (gameData.showPartnerCards && partnerCards && partnerCards.length > 0) {
            cardsHtml = partnerCards.map((card, i) => {
                const animClass = dealAnim ? ' dealing' : '';
                const animStyle = dealAnim ? ` style="animation-delay:${i * 0.15}s"` : '';
                return renderPartnerCardHTML(card, animClass, animStyle);
            }).join('');
        } else {
            for (let i = 0; i < partner.cardCount; i++) {
                const animClass = dealAnim ? ' dealing' : '';
                const animStyle = dealAnim ? ` style="animation-delay:${i * 0.15}s"` : '';
                cardsHtml += `<div class="card-back card-back-small${animClass}"${animStyle}></div>`;
            }
        }

        const toggleLabel = gameData.showPartnerCards ? 'Ocultar' : 'Ver señas';
        const toggleBtn = partnerCards && partnerCards.length > 0
            ? `<button class="ver-senas-btn${gameData.showPartnerCards ? ' active' : ''}" onclick="togglePartnerCards()">${toggleLabel}</button>`
            : '';

        partnerArea.innerHTML = `
            <div class="partner-label">${escapeHtml(partner.username)}${isTurn ? ' ◀' : ''} ${toggleBtn}</div>
            <div class="partner-cards">${cardsHtml}</div>
            ${senaHtml}
        `;
        partnerArea.style.display = '';
        senaBar.style.display = '';
    } else {
        partnerArea.innerHTML = '';
        partnerArea.style.display = 'none';
        if (senaBar) senaBar.style.display = 'none';
    }

    // ── Table layout: opponents top (cards down), your team bottom (cards up) ──
    const tableGrid = document.getElementById('tableGrid');
    const roundLabels = ['1ra', '2da', '3ra'];
    const myTeamPlayers = gameData.players.filter(p => p.team === myTeam);
    const oppTeamPlayers = gameData.players.filter(p => p.team !== myTeam);
    const currentRoundIdx = gameData.tricks.length; // 0, 1, or 2

    // Build card stack for a player — cards overlap upward, ? below last played
    // Each card offsets 16px from the previous. ? slot sits below the last real card.
    const CARD_OFFSET = 24; // px overlap between cards
    const CARD_H = 102;

    function buildCardStack(p) {
        let html = '';
        let slotIdx = 0; // how many cards/slots placed so far
        let lastCardIdx = -1; // index of last REAL card placed

        // Past tricks
        for (let ri = 0; ri < gameData.tricks.length; ri++) {
            const t = gameData.tricks[ri];
            const card = t.cards ? t.cards[p.id] : null;
            const isWin = t.winner === p.team;
            const isParda = t.winner === 2;
            const topPx = slotIdx * CARD_OFFSET;
            const z = slotIdx + 1;
            if (card) {
                const cardKey = `${p.id}_${ri}_${card.value}_${card.suit}`;
                const isNew = !renderedTableCards.has(cardKey);
                if (isNew) renderedTableCards.add(cardKey);
                let cls = isNew ? 'stacked-card' : 'stacked-card no-anim';
                if (isParda) cls += ' parda-card';
                else if (isWin) cls += ' winner-card';
                else cls += ' loser-card';
                const badgeCls = isWin ? 'round-badge won' : 'round-badge';
                html += renderStackedCardHTML(card, cls, `<div class="${badgeCls}">${roundLabels[ri]}</div>`, topPx, z);
                lastCardIdx = slotIdx;
            }
            slotIdx++;
        }

        // Current round card
        const currentCard = gameData.currentRoundCards[p.id];
        if (currentCard) {
            const topPx = slotIdx * CARD_OFFSET;
            const z = slotIdx + 1;
            const cardKey = `${p.id}_cur_${currentCard.value}_${currentCard.suit}`;
            const isNew = !renderedTableCards.has(cardKey);
            if (isNew) renderedTableCards.add(cardKey);
            const animCls = isNew ? 'stacked-card' : 'stacked-card no-anim';
            html += renderStackedCardHTML(currentCard, animCls, `<div class="round-badge">${roundLabels[currentRoundIdx] || ''}</div>`, topPx, z);
            lastCardIdx = slotIdx;
            slotIdx++;
        }

        // ? waiting slot — goes BELOW the last played card
        if (!currentCard && currentRoundIdx < 3) {
            const hasAny = Object.keys(gameData.currentRoundCards).length > 0;
            if (hasAny || gameData.tricks.length > 0) {
                const topPx = slotIdx * CARD_OFFSET;
                html += `<div class="stacked-card-empty" style="top:${topPx}px;z-index:0">?</div>`;
                slotIdx++;
            }
        }

        // Set container height to fit all cards
        const totalH = slotIdx > 0 ? (slotIdx - 1) * CARD_OFFSET + CARD_H : CARD_H;
        return { html, totalH };
    }

    function playerNameHtml(p) {
        const isTurn = p.id === gameData.currentTurn && gameData.phase === 'playing';
        const isMe = p.id === currentUser.id;
        const cls = isTurn ? 'pcol-name active-turn' : 'pcol-name';
        const name = isMe ? 'Vos' : escapeHtml(p.username);
        return `<div class="${cls}">${name}${isTurn ? ' ◀' : ''}</div>`;
    }

    // ── Top half: opponents — name on top, cards stack down ──
    let topHtml = '';
    for (const p of oppTeamPlayers) {
        const stack = buildCardStack(p);
        topHtml += `<div class="player-column">
            ${playerNameHtml(p)}
            <div class="pcol-card-stack">${stack.html}</div>
        </div>`;
    }

    // ── Bottom half: your team — cards stack down, name below ──
    let botHtml = '';
    for (const p of myTeamPlayers) {
        const stack = buildCardStack(p);
        botHtml += `<div class="player-column">
            <div class="pcol-card-stack">${stack.html}</div>
            ${playerNameHtml(p)}
        </div>`;
    }

    // Only rebuild table cards if card data actually changed (prevents jumps on announcements)
    const tableFingerprint = JSON.stringify({
        tricks: gameData.tricks.map(t => t.cards),
        cur: gameData.currentRoundCards,
        turn: gameData.currentTurn,
        phase: gameData.phase,
    });

    if (tableGrid._lastFingerprint !== tableFingerprint) {
        tableGrid._lastFingerprint = tableFingerprint;

        // Preserve any existing announcement in the divider
        const oldDivider = document.getElementById('tableDivider');
        const existingAnnounce = oldDivider ? oldDivider.querySelector('.table-announcement') : null;
        const announceHtml = existingAnnounce ? existingAnnounce.outerHTML : '';

        tableGrid.innerHTML = `
            <div class="table-half top-half">${topHtml}</div>
            <div class="table-divider" id="tableDivider">${announceHtml}</div>
            <div class="table-half bot-half">${botHtml}</div>
        `;
    }

    // Player hand — only rebuild if hand data or turn changed
    const handDiv = document.getElementById('playerHand');
    const isMyTurn = gameData.currentTurn === currentUser.id && gameData.phase === 'playing';
    const handFingerprint = JSON.stringify({
        hand: gameData.yourHand,
        turn: isMyTurn,
        deal: dealAnim,
        spec: gameData.spectating,
    });

    if (handDiv._lastFingerprint !== handFingerprint) {
        handDiv._lastFingerprint = handFingerprint;
        if (gameData.spectating) {
            handDiv.innerHTML = '<div style="color:var(--text-dim);font-style:italic">Modo espectador</div>';
        } else {
            handDiv.innerHTML = (gameData.yourHand || []).map((card, i) => {
                const anim = dealAnim ? ' dealing' : '';
                const playable = isMyTurn ? ' playable' : ' disabled';
                const onclick = isMyTurn ? ` onclick="doPlayCard(${i})"` : '';
                return renderCardHTML(card, `${anim}${playable}`, onclick, i);
            }).join('');
        }
    }

    // Turn off deal animation after first render
    if (gameData.animateCards) gameData.animateCards = false;

    // Action buttons
    renderActionButtons();

    // Turn indicator
    const turnDiv = document.getElementById('turnIndicator');
    if (gameData.currentTurn === currentUser.id) {
        turnDiv.textContent = 'Tu turno';
        turnDiv.className = 'turn-indicator your-turn';
    } else {
        const turnPlayer = gameData.players.find(p => p.id === gameData.currentTurn);
        turnDiv.textContent = turnPlayer ? `Turno de ${turnPlayer.username}` : '';
        turnDiv.className = 'turn-indicator their-turn';
    }
}

function renderActionButtons() {
    const btns = document.getElementById('actionButtons');
    if (gameData.spectating) {
        btns.innerHTML = '';
        return;
    }

    const isMyTurn = gameData.currentTurn === currentUser.id;
    let html = '';

    // Envido (first trick only)
    if (!gameData.firstTrickDone && gameData.tricks.length === 0 && gameData.phase === 'playing') {
        html += `<button class="btn btn-small" onclick="doCallEnvido('envido')">ENVIDO</button>`;
        html += `<button class="btn btn-small btn-silver" onclick="doCallEnvido('real_envido')">REAL ENVIDO</button>`;
        html += `<button class="btn btn-small btn-burgundy" onclick="doCallEnvido('falta_envido')">FALTA ENVIDO</button>`;
    }

    // Truco
    if (gameData.phase === 'playing') {
        html += `<button class="btn btn-small" onclick="doCallTruco()">TRUCO</button>`;
    }

    // Mazo
    html += `<button class="btn btn-small btn-burgundy" onclick="doGoMazo()">MAZO</button>`;

    btns.innerHTML = html;
}

function renderCardHTML(card, extraClass = '', extraAttrs = '', index = 0) {
    const color = SUIT_COLORS[card.suit] || '#333';
    const symbol = SUIT_SYMBOLS[card.suit] || '';
    const delay = index * 0.15;
    return `<div class="card ${card.suit} ${extraClass}" style="animation-delay:${delay}s" ${extraAttrs}>
        <div class="card-corner-tl">
            <div class="card-value">${card.value}</div>
            <div class="card-suit-small">${symbol}</div>
        </div>
        <div class="card-center">${symbol}</div>
        <div class="card-corner-br">
            <div class="card-value">${card.value}</div>
            <div class="card-suit-small">${symbol}</div>
        </div>
    </div>`;
}

function renderRoundCardHTML(card) {
    const color = SUIT_COLORS[card.suit] || '#333';
    const symbol = SUIT_SYMBOLS[card.suit] || '';
    return `<div class="round-card" style="color:${color}">
        <div class="card-corner-tl">
            <div class="card-value" style="font-size:0.95rem">${card.value}</div>
            <div class="card-suit-small" style="font-size:0.8rem">${symbol}</div>
        </div>
        <div class="card-center" style="font-size:2.2rem">${symbol}</div>
        <div class="card-corner-br">
            <div class="card-value" style="font-size:0.95rem">${card.value}</div>
            <div class="card-suit-small" style="font-size:0.8rem">${symbol}</div>
        </div>
    </div>`;
}

function renderTrickCardHTML(card, extraClass = '') {
    const color = SUIT_COLORS[card.suit] || '#333';
    const symbol = SUIT_SYMBOLS[card.suit] || '';
    return `<div class="trick-card ${extraClass}" style="color:${color}">
        <div style="font-size:0.65rem;font-weight:bold">${card.value}</div>
        <div style="font-size:0.9rem">${symbol}</div>
    </div>`;
}

function renderStackedCardHTML(card, extraClass = '', badgeHtml = '', topPx = 0, zIndex = 1) {
    const color = SUIT_COLORS[card.suit] || '#333';
    const symbol = SUIT_SYMBOLS[card.suit] || '';
    return `<div class="${extraClass}" style="color:${color};top:${topPx}px;z-index:${zIndex}">
        ${badgeHtml}
        <div class="card-corner-tl">
            <div class="card-value" style="font-size:0.85rem">${card.value}</div>
            <div class="card-suit-small" style="font-size:0.75rem">${symbol}</div>
        </div>
        <div class="card-center" style="font-size:1.8rem">${symbol}</div>
        <div class="card-corner-br">
            <div class="card-value" style="font-size:0.85rem">${card.value}</div>
            <div class="card-suit-small" style="font-size:0.75rem">${symbol}</div>
        </div>
    </div>`;
}

// ============================================================================
// GAME ACTIONS
// ============================================================================

function togglePartnerCards() {
    if (!gameData) return;
    gameData.showPartnerCards = !gameData.showPartnerCards;
    renderGame();
}

function renderPartnerCardHTML(card, animClass, animStyle) {
    const color = SUIT_COLORS[card.suit] || '#333';
    const symbol = SUIT_SYMBOLS[card.suit] || '';
    return `<div class="partner-mini-card${animClass}"${animStyle} style="color:${color}">
        <div style="font-size:0.7rem;font-weight:bold;line-height:1">${card.value}</div>
        <div style="font-size:0.85rem;line-height:1">${symbol}</div>
    </div>`;
}

function doPlayCard(index) {
    socket.emit('play_card', { cardIndex: index });
}

function doCallEnvido(level) {
    socket.emit('call_envido', { level });
}

function doRespondEnvido(accept) {
    socket.emit('respond_envido', { accept });
    closeAllDecisions();
}

function doCallTruco() {
    socket.emit('call_truco');
}

function doRespondTruco(response) {
    socket.emit('respond_truco', { response });
    closeAllDecisions();
}

function doGoMazo() {
    socket.emit('go_mazo');
}

function sendSena(sena) {
    if (!socket || !gameData) return;
    socket.emit('send_sena', { sena });
    addChatMsg(`Seña enviada: ${sena}`, 'you');
}

// ============================================================================
// DECISION OVERLAYS
// ============================================================================

function showEnvidoDecision(event) {
    const overlay = document.getElementById('envidoDecision');
    overlay.classList.add('active');
    document.getElementById('envidoDecisionTitle').textContent = `¡${event.levelName}!`;
    document.getElementById('envidoDecisionSub').textContent = `${event.username} cantó ${event.levelName}`;

    let btnsHtml = `<button class="btn btn-green" onclick="doRespondEnvido(true)">Quiero</button>`;
    btnsHtml += `<button class="btn btn-burgundy" onclick="doRespondEnvido(false)">No Quiero</button>`;

    // Option to raise
    if (event.level < 2) {
        btnsHtml += `<button class="btn" onclick="closeAllDecisions(); doCallEnvido('envido')">Envido</button>`;
    }
    if (event.level < 3) {
        btnsHtml += `<button class="btn btn-silver" onclick="closeAllDecisions(); doCallEnvido('real_envido')">Real Envido</button>`;
    }
    if (event.level < 4) {
        btnsHtml += `<button class="btn btn-burgundy" onclick="closeAllDecisions(); doCallEnvido('falta_envido')">Falta Envido</button>`;
    }

    document.getElementById('envidoDecisionBtns').innerHTML = btnsHtml;
}

function showTrucoDecision(event) {
    const overlay = document.getElementById('trucoDecision');
    overlay.classList.add('active');
    document.getElementById('trucoDecisionTitle').textContent = `¡${event.levelName}!`;
    document.getElementById('trucoDecisionSub').textContent = `${event.username} cantó ${event.levelName}`;

    let btnsHtml = `<button class="btn btn-green" onclick="doRespondTruco('accept')">Quiero</button>`;
    btnsHtml += `<button class="btn btn-burgundy" onclick="doRespondTruco('reject')">No Quiero</button>`;

    if (event.level < 3) {
        const nextName = event.level === 1 ? 'Retruco' : 'Vale Cuatro';
        btnsHtml += `<button class="btn" onclick="doRespondTruco('raise')">${nextName}</button>`;
    }

    document.getElementById('trucoDecisionBtns').innerHTML = btnsHtml;
}

function showEnvidoReveal(event) {
    const overlay = document.getElementById('envidoReveal');
    overlay.classList.add('active');

    const me = gameData.players.find(p => p.id === currentUser.id);
    const opp = gameData.players.find(p => p.team !== gameData.yourTeam);

    let myScore = 0, oppScore = 0;
    if (event.scores) {
        if (event.scores[currentUser.id]) myScore = event.scores[currentUser.id].score;
        if (opp && event.scores[opp.id]) oppScore = event.scores[opp.id].score;
    }

    const wonEnvido = event.envidoWinner === gameData.yourTeam;

    document.getElementById('envidoRevealContent').innerHTML = `
        <div class="envido-reveal-title">Envido</div>
        <div class="envido-scores">
            <div class="envido-player-score">
                <div class="name">Vos</div>
                <div class="score-val ${wonEnvido ? 'winner' : 'loser'}">${myScore}</div>
            </div>
            <div class="envido-player-score">
                <div class="name">${opp ? escapeHtml(opp.username) : 'Rival'}</div>
                <div class="score-val ${!wonEnvido ? 'winner' : 'loser'}">${oppScore}</div>
            </div>
        </div>
        <div class="envido-result" style="color:${wonEnvido ? 'var(--gold)' : 'var(--burgundy-light)'}">
            ${wonEnvido ? `¡Ganaste! +${event.envidoPoints} pts` : `Perdiste. +${event.envidoPoints} pts para el rival`}
        </div>
    `;

    setTimeout(() => {
        overlay.classList.remove('active');
    }, 3000);
}

function closeAllDecisions() {
    document.getElementById('envidoDecision').classList.remove('active');
    document.getElementById('trucoDecision').classList.remove('active');
}

// ============================================================================
// TABLE ANNOUNCEMENTS & SPEECH BUBBLES
// ============================================================================

function showTableAnnouncement(mainText, subText, styleClass, duration = 2000) {
    // Place announcement inline in the divider area of the table
    const divider = document.getElementById('tableDivider');
    if (!divider) return;
    // Remove any existing announcement
    const old = divider.querySelector('.table-announcement');
    if (old) old.remove();

    const div = document.createElement('div');
    div.className = `table-announcement ${styleClass}`;
    div.innerHTML = `
        <div class="announce-text">${mainText}</div>
        ${subText ? `<div class="announce-subtext">${subText}</div>` : ''}
    `;
    divider.appendChild(div);

    // Fade out before removing
    setTimeout(() => div.classList.add('fade-out'), duration - 500);
    setTimeout(() => div.remove(), duration);
}

function showPointsBadge(points, isYou) {
    const felt = document.getElementById('tableFelt');
    if (!felt) return;
    const badge = document.createElement('div');
    badge.className = `points-badge ${isYou ? 'player-pts' : 'bot-pts'}`;
    badge.textContent = `+${points}`;
    felt.appendChild(badge);
    setTimeout(() => badge.remove(), 2000);
}

function showSpeechBubble(text, username, style = '') {
    // Determine if this is the current user or opponent
    const isYou = username === currentUser.username;
    const bubble = document.createElement('div');
    bubble.className = `speech-bubble ${isYou ? 'player-bubble' : 'bot-bubble'} ${style}`;
    bubble.textContent = text;
    document.body.appendChild(bubble);
    setTimeout(() => bubble.remove(), 2500);
}

// ============================================================================
// GAME OVER
// ============================================================================

function showGameOver(data) {
    const overlay = document.getElementById('gameOverOverlay');
    overlay.classList.add('active');

    const won = data.winnerTeam === gameData.yourTeam;
    const titleEl = document.getElementById('gameOverTitle');
    titleEl.textContent = won ? '¡GANASTE!' : 'PERDISTE';
    titleEl.className = `game-over-title ${won ? 'won' : 'lost'}`;

    document.getElementById('gameOverScores').textContent =
        `${data.finalScores[gameData.yourTeam]} - ${data.finalScores[1 - gameData.yourTeam]}`;
}

function backToLobby() {
    document.getElementById('gameOverOverlay').classList.remove('active');
    gameData = null;
    leaveRoom();
}

// ============================================================================
// CHAT
// ============================================================================

function addChatMsg(text, type) {
    const div = document.getElementById('chatMessages');
    if (!div) return;
    const msg = document.createElement('div');
    msg.className = `chat-msg ${type}`;
    msg.textContent = text;
    div.appendChild(msg);
    div.scrollTop = div.scrollHeight;
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit('chat_message', msg);
    input.value = '';
}

function sendLobbyChat() {
    const input = document.getElementById('lobbyChatInput');
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit('lobby_chat', msg);
    input.value = '';
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('chatInput')) {
        sendChat();
    }
    if (e.key === 'Enter' && document.activeElement === document.getElementById('lobbyChatInput')) {
        sendLobbyChat();
    }
});

// ============================================================================
// UTILS
// ============================================================================

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ============================================================================
// CANVAS WAVE BACKGROUND
// ============================================================================

(function() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Golden particles floating upward + ambient glow
    const particles = [];
    const PARTICLE_COUNT = 60;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2.5 + 0.5,
            speed: Math.random() * 0.6 + 0.2,
            drift: (Math.random() - 0.5) * 0.5,
            alpha: Math.random() * 0.6 + 0.2,
            pulse: Math.random() * Math.PI * 2,
            pulseSpeed: Math.random() * 0.02 + 0.01,
        });
    }

    let t = 0;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dark gradient base
        const bg = ctx.createRadialGradient(
            canvas.width * 0.5, canvas.height * 0.4, 0,
            canvas.width * 0.5, canvas.height * 0.5, canvas.width * 0.7
        );
        bg.addColorStop(0, 'rgba(25,20,10,0.4)');
        bg.addColorStop(0.5, 'rgba(10,8,5,0.3)');
        bg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Ambient golden glow spots
        const glow1X = canvas.width * 0.2 + Math.sin(t * 0.005) * 80;
        const glow1Y = canvas.height * 0.3 + Math.cos(t * 0.003) * 60;
        const g1 = ctx.createRadialGradient(glow1X, glow1Y, 0, glow1X, glow1Y, 250);
        g1.addColorStop(0, 'rgba(245,197,24,0.06)');
        g1.addColorStop(1, 'rgba(245,197,24,0)');
        ctx.fillStyle = g1;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const glow2X = canvas.width * 0.8 + Math.cos(t * 0.004) * 100;
        const glow2Y = canvas.height * 0.7 + Math.sin(t * 0.006) * 50;
        const g2 = ctx.createRadialGradient(glow2X, glow2Y, 0, glow2X, glow2Y, 300);
        g2.addColorStop(0, 'rgba(245,197,24,0.04)');
        g2.addColorStop(1, 'rgba(245,197,24,0)');
        ctx.fillStyle = g2;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw particles
        for (const p of particles) {
            p.y -= p.speed;
            p.x += p.drift + Math.sin(t * 0.01 + p.pulse) * 0.3;
            p.pulse += p.pulseSpeed;
            const a = p.alpha * (0.5 + 0.5 * Math.sin(p.pulse));

            if (p.y < -10) {
                p.y = canvas.height + 10;
                p.x = Math.random() * canvas.width;
            }
            if (p.x < -10) p.x = canvas.width + 10;
            if (p.x > canvas.width + 10) p.x = -10;

            // Glow
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 6);
            grad.addColorStop(0, `rgba(245,197,24,${a * 0.4})`);
            grad.addColorStop(1, 'rgba(245,197,24,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(p.x - p.r * 6, p.y - p.r * 6, p.r * 12, p.r * 12);

            // Core
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(245,197,24,${a})`;
            ctx.fill();
        }

        t++;
        requestAnimationFrame(draw);
    }
    draw();
})();

// ============================================================================
// AUTO-LOGIN CHECK
// ============================================================================

(async function init() {
    if (token) {
        try {
            const res = await fetch(API_BASE + '/api/auth/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                currentUser = data.user;
                connectSocket();
                enterLobby();
                return;
            }
        } catch (e) {}
        localStorage.removeItem('shtruco_token');
        token = null;
    }
})();
